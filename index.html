<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Галерея скинов</title>
    <script src="https://unpkg.com/skinview3d@3.0.0/dist/skinview3d.bundle.js"></script>
    <style>
        body { margin: 0; background: #141414; color: #fff; font-family: sans-serif; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1f1f1f; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; border: 1px solid #333; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; }
        #viewer { width: 100%; height: 100%; }
        .controls { position: absolute; top: 20px; left: 20px; z-index: 101; }
        button { padding: 10px; cursor: pointer; background: #00ca72; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="gallery" id="gallery"></div>

    <div id="modal">
        <div class="controls">
            <button onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
            <button id="layer-btn">Переключить слой</button>
        </div>
        <div id="viewer"></div>
    </div>

    <script>
        let viewer;

        // Загрузка галереи
        fetch('skins.json').then(r => r.json()).then(data => {
            const container = document.getElementById('gallery');
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>${s.skinName}</h3><p>${s.customer}</p>`;
                div.onclick = () => openSkin('skins/' + s.filename + '.png');
                container.appendChild(div);
            });
        });

        function openSkin(url) {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('viewer').innerHTML = ''; // Очистка старого
            
            viewer = new SkinViewer({
                container: document.getElementById("viewer"),
                width: window.innerWidth,
                height: window.innerHeight,
                skin: url
            });
            viewer.controls.enableZoom = true;
            viewer.autoRotate = true;
        }

        document.getElementById('layer-btn').onclick = () => {
            if (viewer.playerObject.skin.secondLayer.visible) {
                viewer.playerObject.skin.secondLayer.visible = false;
            } else {
                viewer.playerObject.skin.secondLayer.visible = true;
            }
        };
    </script>
</body>
</html>
