<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея Заказов Скинов</title>
    <script src="https://bsptnhs.github.io/skinview3d/bundles/skinview3d.bundle.js"></script>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --accent: #00ca72;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        h1 { text-align: center; font-weight: 600; margin-bottom: 30px; }
        
        /* Сетка галереи */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            cursor: pointer;
            border: 1px solid #2a2a2a;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card .customer { font-size: 12px; color: var(--accent); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .card .skin-name { font-size: 18px; margin: 8px 0; font-weight: bold; }
        .card .model-type { font-size: 12px; color: var(--text-muted); }
        
        /* Модальное окно 3D просмотра */
        #viewer-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #skin-container { width: 100%; height: 100%; }
        .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 35px; color: white; cursor: pointer;
            background: none; border: none; z-index: 1001;
        }
        .close-btn:hover { color: var(--accent); }
        #loading { position: absolute; color: white; font-size: 20px; pointer-events: none; }
    </style>
</head>
<body>

    <h1>Каталог выполненных скинов</h1>
    <div class="gallery" id="gallery"></div>

    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">&times;</button>
        <div id="loading">Загрузка 3D модели...</div>
        <div id="skin-container"></div>
    </div>

    <script>
        let skinViewer = null;

        // Загружаем список скинов из нашего JSON файла
        fetch('skins.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.forEach(skin => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="customer">${skin.customer}</div>
                        <div class="skin-name">${skin.skinName}</div>
                        <div class="model-type">Формат: ${skin.model === 'slim' ? 'Алекс' : 'Стив'}</div>
                    `;
                    card.onclick = () => openViewer(skin.filename, skin.model);
                    gallery.appendChild(card);
                });
            });

        function openViewer(filename, modelType) {
            document.getElementById('viewer-modal').style.display = 'flex';
            document.getElementById('loading').style.display = 'block';

            const container = document.getElementById('skin-container');
            container.innerHTML = ''; // Очищаем старый холст если был

            skinViewer = new skinview3d.SkinViewer({
                canvas: document.createElement("canvas"),
                width: window.innerWidth,
                height: window.innerHeight,
                model: modelType
            });

            container.appendChild(skinViewer.canvas);
            
            skinViewer.loadSkin(`skins/${filename}.png`).then(() => {
                document.getElementById('loading').style.display = 'none';
            }).catch(() => {
                document.getElementById('loading').innerText = 'Ошибка загрузки файла скина';
            });

            skinViewer.autoRotate = true;
            skinViewer.autoRotateSpeed = 0.6;
            skinview3d.createOrbitControls(skinViewer);
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            if (skinViewer) {
                skinViewer.dispose();
                skinViewer = null;
            }
        }

        window.addEventListener('resize', () => {
            if (skinViewer) {
                skinViewer.width = window.innerWidth;
                skinViewer.height = window.innerHeight;
            }
        });

        // ================= ЗАЩИТА ОТ СКАЧИВАНИЯ =================
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault());
        document.addEventListener('selectstart', event => event.preventDefault());
    </script>
</body>
</html>
