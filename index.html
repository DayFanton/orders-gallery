<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея 3D Скинов</title>
    
    <link rel="icon" href="data:,">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://bs-community.github.io/skinview3d/js/skinview3d.bundle.js"></script>

    <style>
        :root {
            --bg-main: #0b0b0d;
            --bg-sidebar: #131316;
            --bg-card: #1c1c21;
            --bg-hover: #26262b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #10b981;
            --border: #27272a;
        }

        body {
            margin: 0 !important;
            padding: 0;
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Боковая панель со списком */
        .sidebar {
            width: 340px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            margin: 0 0 15px 0;
            font-size: 1.25rem;
        }

        .sort-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-container label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .sort-select {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .skin-list-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .skin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .skin-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            text-align: center;
        }

        .skin-item:hover {
            background-color: var(--bg-hover);
            border-color: var(--text-muted);
        }

        .skin-item.active {
            border-color: var(--accent);
            background-color: var(--bg-hover);
        }

        .canvas-avatar {
            image-rendering: pixelated;
            margin-bottom: 8px;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.15);
        }

        .skin-name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .skin-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .grid-spacer {
            height: 0;
            visibility: hidden;
        }

        /* Главная область просмотра */
        .main-viewer {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        #skin_container {
            width: 100%;
            height: 100%;
        }

        #skin_container canvas {
            display: block;
            outline: none;
        }

        /* Панель управления персонажем */
        .controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(28, 28, 33, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .controls-panel h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .control-group select, .control-group input[type="range"] {
            width: 100%;
            box-sizing: border-box;
        }

        .control-group select {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem !important;
            color: var(--text-main) !important;
        }

        .checkbox-label input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .radio-options {
            display: flex;
            gap: 10px;
            background-color: var(--bg-main);
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .radio-options label {
            flex: 1;
            text-align: center;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-main);
            transition: background-color 0.2s;
        }

        .radio-options input {
            display: none;
        }

        .radio-options label:has(input:checked) {
            background-color: var(--accent);
            color: #fff;
            font-weight: 500;
        }

        #loading {
            position: absolute;
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Коллекция скинов</h2>
            <div class="sort-container">
                <label for="sort_select">Сортировка:</label>
                <select id="sort_select" class="sort-select">
                    <option value="default">По умолчанию</option>
                    <option value="name">По названию</option>
                    <option value="date">По дате (сначала новые)</option>
                </select>
            </div>
        </div>
        <div class="skin-list-wrapper">
            <div id="skin_list" class="skin-grid"></div>
        </div>
    </div>

    <div class="main-content main-viewer">
        <div id="loading">Загрузка просмотрщика...</div>
        <div id="skin_container"></div>

        <div class="controls-panel">
            <h3>Настройки 3D</h3>

            <div class="control-group">
                <label for="animation_select">Активная анимация</label>
                <select id="animation_select">
                    <option value="idle" selected>Ожидание (Idle)</option>
                    <option value="walk">Ходьба (Walk)</option>
                    <option value="run">Бег (Run)</option>
                    <option value="fly">Полёт (Fly)</option>
                    <option value="swing">Удары руками (Swing)</option>
                </select>
            </div>

            <div class="control-group" id="swing_arm_container" style="display: none;">
                <label for="swing_arm_select">Активная рука для удара</label>
                <select id="swing_arm_select">
                    <option value="right" selected>Правая рука</option>
                    <option value="left">Левая рука</option>
                </select>
            </div>

            <div class="control-group">
                <label>Снаряжение за спиной</label>
                <div class="radio-options">
                    <label><input type="radio" name="back_equipment" value="none" checked> Нет</label>
                    <label><input type="radio" name="back_equipment" value="cape"> Плащ</label>
                    <label><input type="radio" name="back_equipment" value="elytra"> Элитры</label>
                </div>
            </div>

            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="shift_checkbox"> Режим скрытности (Shift)
                </label>
            </div>

            <div class="control-group">
                <label for="rotate_speed">Скорость авто-вращения</label>
                <input type="range" id="rotate_speed" min="0" max="4" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label for="animation_speed">Скорость движения/анимации</label>
                <input type="range" id="animation_speed" min="0.1" max="3" step="0.1" value="1">
            </div>
        </div>
    </div>

    <script>
        let viewer = null;
        let globalSkins = [];
        let currentSelectedFilename = null;

        // Конфигурация кастомных параметров анимации
        let currentAnimType = "idle";
        let currentSwingArm = "right";

        // Функция 2D-отрисовки аватара лица скина
        function drawSkinAvatar(skinSrc, canvas) {
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = skinSrc;
            img.onload = () => {
                ctx.imageSmoothingEnabled = false;
                // Базовый слой головы (координаты на развёртке: 8, 8, размер 8x8)
                ctx.drawImage(img, 8, 8, 8, 8, 0, 0, canvas.width, canvas.height);
                // Оверлей (второй слой шлема/волос: 40, 8, размер 8x8)
                ctx.drawImage(img, 40, 8, 8, 8, 0, 0, canvas.width, canvas.height);
            };
        }

        // Инициализация 3D SkinViewer
        function initViewer() {
            const container = document.getElementById('skin_container');
            
            viewer = new skinview3d.SkinViewer({
                canvas: document.createElement('canvas'),
                width: container.clientWidth,
                height: container.clientHeight,
                preserveDrawingBuffer: true
            });

            container.appendChild(viewer.canvas);
            document.getElementById('loading').style.display = 'none';

            // Настройка дефолтных параметров камеры и освещения
            viewer.autoRotate = true;
            viewer.autoRotateSpeed = 1.0;
            viewer.controls.enableZoom = true;
            viewer.controls.enableRotate = true;
            viewer.controls.enablePan = false;

            // Первоначальный запуск анимации по умолчанию
            updateActiveAnimation();

            // Привязка обработчиков интерфейса
            setupControlListeners();

            // Следим за ресайзом окна
            window.addEventListener('resize', () => {
                if (viewer) {
                    viewer.setSize(container.clientWidth, container.clientHeight);
                }
            });
        }

        // Логика переключения анимаций, включая ручное управление конечностями для ударов
        function updateActiveAnimation() {
            if (!viewer) return;

            // Сбрасываем старую анимацию перед изменением
            if (viewer.animation) {
                viewer.animation = null;
            }

            // На всякий случай возвращаем руки в исходное положение
            viewer.playerObject.skin.rightArm.rotation.x = 0;
            viewer.playerObject.skin.leftArm.rotation.x = 0;

            const animSpeed = parseFloat(document.getElementById('animation_speed').value);
            const swingContainer = document.getElementById('swing_arm_container');

            if (currentAnimType === "swing") {
                swingContainer.style.display = "flex";
                
                // Кастомный объект анимации удара для skinview3d
                viewer.animation = {
                    speed: animSpeed,
                    animate: (playerObject, time) => {
                        const wave = Math.sin(time * 7) * 0.9;
                        if (currentSwingArm === "right") {
                            playerObject.skin.rightArm.rotation.x = -0.6 + wave;
                            playerObject.skin.leftArm.rotation.x = 0;
                        } else {
                            playerObject.skin.leftArm.rotation.x = -0.6 + wave;
                            playerObject.skin.rightArm.rotation.x = 0;
                        }
                    }
                };
            } else {
                swingContainer.style.display = "none";
                
                if (currentAnimType === "walk") {
                    viewer.animation = new skinview3d.WalkingAnimation();
                } else if (currentAnimType === "run") {
                    viewer.animation = new skinview3d.RunningAnimation();
                } else if (currentAnimType === "fly") {
                    viewer.animation = new skinview3d.FlyingAnimation();
                } else {
                    viewer.animation = new skinview3d.IdleAnimation();
                }
                
                if (viewer.animation) {
                    viewer.animation.speed = animSpeed;
                }
            }
        }

        // Привязка событий элементов управления к свойствам SkinViewer
        function setupControlListeners() {
            // Изменение анимации
            document.getElementById('animation_select').addEventListener('change', (e) => {
                currentAnimType = e.target.value;
                updateActiveAnimation();
            });

            // Изменение руки для удара
            document.getElementById('swing_arm_select').addEventListener('change', (e) => {
                currentSwingArm = e.target.value;
                updateActiveAnimation();
            });

            // Режим скрытности (Shift)
            document.getElementById('shift_checkbox').addEventListener('change', (e) => {
                viewer.playerObject.skin.sneaking = e.target.checked;
            });

            // Скорость авто-вращения
            document.getElementById('rotate_speed').addEventListener('input', (e) => {
                const speed = parseFloat(e.target.value);
                viewer.autoRotateSpeed = speed;
                viewer.autoRotate = speed > 0;
            });

            // Скорость анимации
            document.getElementById('animation_speed').addEventListener('input', (e) => {
                const speed = parseFloat(e.target.value);
                if (viewer.animation) {
                    viewer.animation.speed = speed;
                }
            });

            // Переключатель снаряжения за спиной (Плащ / Элитры)
            document.querySelectorAll('input[name="back_equipment"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const value = e.target.value;
                    if (value === "none") {
                        viewer.playerObject.backEquipment = null;
                    } else {
                        viewer.playerObject.backEquipment = value; // "cape" или "elytra"
                    }
                });
            });

            // Изменение логики сортировки списка скинов
            document.getElementById('sort_select').addEventListener('change', () => {
                renderSkinList();
            });
        }

        // Выбор и загрузка скина в структуру вьювера
        function selectSkin(filename, updateUrl = true) {
            if (!viewer) return;
            
            currentSelectedFilename = filename;
            const skinPath = `skins/${filename}.png`;
            const skinData = globalSkins.find(s => s.filename === filename);
            const modelType = (skinData && skinData.model === 'alex') ? 'alex' : 'default';

            // Полная перезагрузка текстуры кожи модели
            viewer.loadSkin(skinPath, { model: modelType });

            // Попытка загрузить соответствующий плащ, если он есть
            viewer.loadCape(`capes/${filename}.png`).catch(() => {
                // Если индивидуального плаща нет, сбрасываем или ставим стандартный
                viewer.loadCape(`capes/default.png`).catch(() => {});
            });

            // Синхронизация визуального выделения карточки
            document.querySelectorAll('.skin-item').forEach(item => item.classList.remove('active'));
            const currentCard = document.getElementById(`skin-${filename}`);
            if (currentCard) {
                currentCard.classList.add('active');
            }

            // Обновление URL адреса без перезагрузки страницы
            if (updateUrl) {
                const params = new URLSearchParams(window.location.search);
                params.set('skin', filename);
                window.history.pushState({}, '', `${window.location.pathname}?${params.toString()}`);
            }
        }

        // Сортировка данных и генерация структуры карточек в DOM
        function renderSkinList() {
            const list = document.getElementById('skin_list');
            list.innerHTML = '';

            const sortMethod = document.getElementById('sort_select').value;
            let displayList = [...globalSkins];

            // Алгоритмы сортировки
            if (sortMethod === 'name') {
                displayList.sort((a, b) => {
                    const nameA = a.skinName || 'Без названия';
                    const nameB = b.skinName || 'Без названия';
                    return nameA.localeCompare(nameB, 'ru');
                });
            } else if (sortMethod === 'date') {
                displayList.sort((a, b) => {
                    // Конвертация дат формата DD.MM.YYYY для валидного сравнения
                    const parseDate = (str) => {
                        if (!str) return new Date(0);
                        const parts = str.split('.');
                        if(parts.length !== 3) return new Date(0);
                        return new Date(parts[2], parts[1] - 1, parts[0]);
                    };
                    return parseDate(b.date) - parseDate(a.date);
                });
            }

            // Генерация HTML карточек
            displayList.forEach(skin => {
                const skinPath = `skins/${skin.filename}.png`;
                const item = document.createElement('div');
                item.className = 'skin-item';
                item.id = `skin-${skin.filename}`;
                
                if (skin.filename === currentSelectedFilename) {
                    item.classList.add('active');
                }

                item.innerHTML = `
                    <canvas class="canvas-avatar" width="64" height="64"></canvas>
                    <span class="skin-name">${skin.skinName || 'Без названия'}</span>
                    <span class="skin-date">${skin.date || ''}</span>
                `;
                
                list.appendChild(item);
                
                // Рендерим маленькое лицо на аватарку
                const canvas = item.querySelector('.canvas-avatar');
                drawSkinAvatar(skinPath, canvas);

                item.onclick = () => selectSkin(skin.filename, true);
            });

            // Спейсеры грида для ровного заполнения последней строки
            for (let i = 0; i < 4; i++) {
                const spacer = document.createElement('div');
                spacer.className = 'grid-spacer';
                list.appendChild(spacer);
            }
        }

        // Загрузка JSON конфигурации при старте приложения
        async function loadSkinsJSON() {
            try {
                const response = await fetch('skins.json');
                globalSkins = await response.json();
                
                // Инициализируем плеер
                initViewer();

                // Выводим отсортированный список на экран
                renderSkinList();

                // Чтение параметров из URL для сохранения сессии активного скина
                const params = new URLSearchParams(window.location.search);
                const activeSkin = params.get('skin');

                if (activeSkin && globalSkins.some(s => s.filename === activeSkin)) {
                    selectSkin(activeSkin, false);
                } else if (globalSkins.length > 0) {
                    selectSkin(globalSkins[0].filename, false);
                }

            } catch (err) {
                document.getElementById('loading').textContent = "Не удалось прочесть список skins.json";
                console.error(err);
            }
        }

        window.onload = loadSkinsJSON;
    </script>
</body>
</html>
