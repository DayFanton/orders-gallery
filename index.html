<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея Цыпляша</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="icon" href="data:,">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://bs-community.github.io/skinview3d/js/skinview3d.bundle.js"></script>

    <style>
        :root {
            --bg-main: #0b0b0d;
            --bg-sidebar: #131316;
            --bg-card: #1c1c21;
            --bg-hover: #26262b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #fff001;
            --border: #27272a;
        }

        body {
            margin: 0 !important;
            padding: 0;
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #sidebar {
            width: 360px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        .sidebar-header {
            padding: 20px 16px 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* СТИЛИ ДЛЯ ВЫПАДАЮЩЕГО СПИСКА СОРТИРОВКИ */
        .dropdown-sort {
            position: relative;
        }

        .sort-trigger-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
            height: 24px;
            box-sizing: border-box;
        }

        .sort-trigger-btn:hover, .sort-trigger-btn.active {
            color: #fff;
            border-color: var(--text-muted);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            min-width: 160px;
            z-index: 100;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            transition: 0.15s;
        }

        .dropdown-item:hover {
            background: var(--bg-hover);
            color: #fff;
        }

        .dropdown-item.active {
            color: #fff;
        }

        /* Круглый чекбокс/радио кнопка как на скриншоте */
        .radio-circle {
            width: 14px;
            height: 14px;
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .dropdown-item.active .radio-circle {
            border-color: #fff001;
        }

        .dropdown-item.active .radio-circle::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #fff001;
            border-radius: 50%;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        /* Заголовки разделения авторов */
        .author-group-header {
            width: 100%;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
            padding: 16px 4px 6px 4px;
            margin-bottom: 4px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border);
        }

        .skin-list.view-grid .author-group-header {
            grid-column: 1 / -1; /* Растягивание на всю ширину сетки плиток */
            margin-top: 8px;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            padding: 2px;
            border-radius: 6px;
            border: 1px solid var(--border);
            height: 24px;
            box-sizing: border-box;
            align-items: center;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
            height: 18px;
            line-height: 14px;
        }

        .toggle-btn.active {
            background: var(--bg-hover);
            color: #fff;
        }

        .skin-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            box-sizing: border-box;
        }

        /* РЕЖИМ СПИСОК */
        .skin-list.view-list {
            display: flex !important;
            flex-direction: column !important;
        }
        .skin-list.view-list .skin-item {
            display: flex !important;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-card);
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            width: 100% !important;
            height: auto !important;
            box-sizing: border-box;
        }
        .skin-list.view-list .canvas-avatar { display: none !important; }
        .skin-list.view-list .skin-date { font-size: 0.75rem; color: var(--text-muted); display: inline !important; margin-left: 8px; flex-shrink: 0; }
        .skin-list.view-list .skin-name { text-align: left; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; flex: 1; }

        /* РЕЖИМ ПЛИТКИ */
        .skin-list.view-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)) !important;
            gap: 8px !important;
            padding-bottom: 16px;
            align-content: flex-start;
        }
        .skin-list.view-grid .skin-item {
            background: var(--bg-card) !important;
            border: 1px solid transparent;
            border-radius: 8px;
            width: 100% !important;          
            aspect-ratio: 1 / 1 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer;
            padding: 6px !important;
            box-sizing: border-box !important;
            transition: background 0.2s ease, border-color 0.2s ease;
            margin-bottom: 0 !important;
        }
        .skin-list.view-grid .grid-spacer {
            display: none !important;
        }
        .skin-list.view-grid .canvas-avatar {
            display: block !important;
            width: 42px !important;
            height: 42px !important;
            border-radius: 4px;
            background: #27272a;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 4px !important;
            flex-shrink: 0 !important;
        }
        .skin-list.view-grid .skin-name {
            font-size: 0.7rem !important;
            font-weight: 500;
            text-align: center !important;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            width: 100% !important;
            display: block !important;
        }
        .skin-list.view-grid .skin-date {
            display: none !important; 
        }

        .skin-list .skin-item:hover { background: var(--bg-hover); }
        .skin-list .skin-item.active { background: rgba(184, 134, 11, 0.08); border-color: var(--accent); }

        .meta-info {
            padding: 20px 24px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .meta-row {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-label { color: var(--text-muted); }
        .meta-value { font-weight: 500; color: #fff; background: var(--bg-card); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); max-width: 60%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        #viewer_zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: background 0.4s ease;
        }

        #skin_container {
            width: 100%;
            height: 100%;
            outline: none;
            cursor: grab;
        }

        #skin_container:active { cursor: grabbing; }

        #controls_panel {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .controls-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .control-group {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .control-group h3 {
            margin: 0 0 12px 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
        }

        .btn {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .checkbox-label input {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .radio-btn input { position: absolute; opacity: 0; width: 0; height: 0; }
        .radio-btn span {
            display: block;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .radio-btn input:checked + span {
            background: rgba(184, 134, 11, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        /* Стили контейнеров для ползунков скорости */
        .slider-container {
            margin-top: 12px;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .control-slider {
            width: 100%;
            accent-color: var(--accent);
            background: var(--bg-main);
            height: 5px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        /* --- СТИЛИ ДЛЯ ПЛАЩЕЙ И ЭЛИТР --- */
        .cape-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .cape-item {
            aspect-ratio: 10 / 16;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .cape-item:hover {
            border-color: var(--text-muted);
            background: var(--bg-hover);
        }

        .cape-item.active {
            border-color: var(--accent);
            background: rgba(184, 134, 11, 0.1);
        }

        /* Кроппинг задника плаща (текстура 64x32) с помощью адаптивных процентов */
        .cape-icon-wrapper img {
            position: absolute;
            width: 640%;   /* (64 пикселя всего / 10 пикселей задника) * 100% */
            height: 200%;  /* (32 пикселя всего / 16 пикселей задника) * 100% */
            left: -10%;    /* Сдвиг к координате X=1 */
            top: -6.25%;   /* Сдвиг к координате Y=1 */
            image-rendering: pixelated;
            display: none; /* Проявится программно после расшифровки */
        }

        .cape-item#cape-none {
            font-size: 1.1rem;
            color: var(--text-muted);
        }
        .cape-item#cape-none:hover {
            color: #ef4444;
        }

        .bg-selector-group {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid var(--border);
        }

        .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .bg-dot {
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .bg-dot:hover { transform: scale(1.05); }
        .bg-dot.active { border-color: #fff; }

        .bg-dot.custom-color-btn {
            background: #27272a;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .bg-dot.custom-color-btn::before {
            content: '';
            width: 16px;
            height: 16px;
            background-color: #fff;
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 20h9'/><path d='M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z'/></svg>") no-repeat center;
            -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 20h9'/><path d='M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z'/></svg>") no-repeat center;
        }
        .bg-dot.custom-color-btn input[type="color"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        #loading {
            position: absolute;
            font-size: 0.9rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <span class="section-title">Галерея</span>
            <div class="header-controls">
                
                <div class="dropdown-sort">
                    <button class="sort-trigger-btn" id="sortTrigger">
                        <span>Сортировка</span>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div class="dropdown-menu" id="sortMenu">
                        <div class="dropdown-item" data-field="author"><span class="radio-circle"></span>По автору</div>
                        <div class="dropdown-item" data-field="name"><span class="radio-circle"></span>По названию</div>
                        <div class="dropdown-item" data-field="date"><span class="radio-circle"></span>По дате</div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item" data-order="desc"><span class="radio-circle"></span>По убыванию</div>
                        <div class="dropdown-item" data-order="asc"><span class="radio-circle"></span>По возрастанию</div>
                    </div>
                </div>

                <div class="view-toggle">
                    <button class="toggle-btn active" id="btnListView">Список</button>
                    <button class="toggle-btn" id="btnGridView">Плитка</button>
                </div>
            </div>
        </div>
        <div class="skin-list view-list" id="skinList"></div>
        
        <div class="meta-info">
            <div class="meta-row">
                <span class="meta-label">Заказчик</span>
                <span class="meta-value" id="infoCustomer">—</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Художник</span>
                <span class="meta-value" id="infoAuthor">—</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Дата создания</span>
                <span class="meta-value" id="infoDate">—</span>
            </div>
        </div>
    </div>

    <div id="viewer_zone">
        <div id="loading">Загрузка модулей визуализации...</div>
        <canvas id="skin_container"></canvas>
    </div>

    <div id="controls_panel">
        <div class="controls-scroll">
            <div class="control-group">
                <button class="btn" id="reset_all">Сбросить камеру</button>
            </div>

            <div class="control-group">
                <h3>Вращение</h3>
                <label class="checkbox-label">
                    <input type="checkbox" id="auto_rotate">
                    <span>Вращать модель</span>
                </label>
                
                <div class="slider-container">
                    <div class="slider-header">
                        <span>Скорость вращения</span>
                        <span id="rotate_speed_val">1.0</span>
                    </div>
                    <input type="range" id="rotate_speed" class="control-slider" min="0.1" max="10.0" step="0.1" value="1.0">
                </div>
            </div>

            <div class="control-group">
                <h3>Анимация движения</h3>
                <label class="checkbox-label">
                    <input type="checkbox" id="pause_animation">
                    <span>Поставить на паузу</span>
                </label>
                
                <div class="radio-grid">
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="none" checked>
                        <span>Покой</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="walk">
                        <span>Ходьба</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="run">
                        <span>Бег</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="fly">
                        <span>Полет</span>
                    </label>
                </div>

                <div class="slider-container">
                    <div class="slider-header">
                        <span>Скорость анимации</span>
                        <span id="anim_speed_val">1.0</span>
                    </div>
                    <input type="range" id="anim_speed" class="control-slider" min="0.1" max="10.0" step="0.1" value="1.0">
                </div>
            </div>

            <div class="control-group">
                <h3>Отображение слоев</h3>
                <label class="checkbox-label">
                    <input type="checkbox" id="layer_head" checked>
                    <span>Головной убор / Волосы</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="layer_body" checked>
                    <span>Верхняя одежда / Броня</span>
                </label>
            </div>

            <div class="control-group">
                <h3>Плащ и Элитры</h3>
                <label class="checkbox-label">
                    <input type="checkbox" id="elytra_toggle">
                    <span>Отображать элитры</span>
                </label>
                
                <div style="margin-top: 14px;">
                    <h4 style="margin: 0 0 8px 0; font-size: 0.8rem; font-weight: 600; color: var(--text-muted);">Выбор плаща</h4>
                    <div class="cape-grid">
                        <div class="cape-item active" id="cape-none" title="Снять плащ">❌</div>
                        
                        <div class="cape-item cape-icon-wrapper" id="cape-migrator" data-cape="migrator" title="Плащ Мигратора">
                            <img id="img-preview-migrator" alt="Migrator">
                        </div>
                        
                        <div class="cape-item cape-icon-wrapper" id="cape-pancake" data-cape="pancake" title="Плащ Панкейка">
                            <img id="img-preview-pancake" alt="Pancake">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-selector-group">
            <span class="section-title" style="padding:0;">Цвет фона</span>
            <div class="bg-grid" id="bgGrid"></div>
        </div>
    </div>

    <script>
        let skinViewer = null;
        let globalSkins = [];
        let currentAnimationType = 'none';
        
        // Переменные для сохранения выбранной пользователем скорости
        let currentRotationSpeed = 1.0;
        let currentAnimationSpeed = 1.0;
        
        // Текущие параметры сортировки (по умолчанию как на скриншоте)
        let currentSortField = 'name'; 
        let currentSortOrder = 'desc';
        let currentActiveSkinFilename = null;

        // Переменные состояния спины
        let currentCapeFilename = null;
        let elytraEnabled = false;

        // Текстура дефолтных элитр из официальных примеров skinview3d
        const DEFAULT_ELYTRA_URL = "https://raw.githubusercontent.com/bs-community/skinview3d/master/examples/img/elytra.png";

        const bgPresets = [
            { name: 'Тёмный', value: 'radial-gradient(circle at center, #1c1c24 0%, #0b0b0d 100%)', color: '#1c1c24' },
            { name: 'Светлый', value: 'radial-gradient(circle at center, #f4f4f5 0%, #e4e4e7 100%)', color: '#e4e4e7' },
            { name: 'Тёмно-фиолетовый', value: 'radial-gradient(circle at center, #2e1065 0%, #0f052d 100%)', color: '#2e1065' },

const DECRYPT_KEY = "jkfSKGjdfddddddsDayFantonDevaTridsatDva";

async function getDecryptedBlobUrl(filename) {
    const cleanFilename = filename.replace(/\.(png|PNG)$/, "");
    const response = await fetch(`skins_enc/${cleanFilename}.png.txt`);
    if (!response.ok) throw new Error("Файл не найден");
    
    const base64Data = await response.text();
    
    const binaryString = atob(base64Data);
    const bytes = new Uint8Array(binaryString.length);
    const keyBytes = new TextEncoder().encode(DECRYPT_KEY);
    
    for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i) ^ keyBytes[i % keyBytes.length];
    }
    
    return URL.createObjectURL(new Blob([bytes], { type: 'image/png' }));
}

// Умная функция обновления экипировки на спине персонажа
async function updateBackEquipment() {
    if (!skinViewer) return;

    // Сценарий 1: Всё выключено
    if (!currentCapeFilename && !elytraEnabled) {
        skinViewer.loadCape(null);
        return;
    }

    // Сценарий 2: Только элитры (без плаща) -> загружаем серые дефолтные крылья
    if (elytraEnabled && !currentCapeFilename) {
        try {
            await skinViewer.loadCape(DEFAULT_ELYTRA_URL, { backEquipment: 'elytra' });
        } catch (e) {
            console.error("Не удалось загрузить стандартные элитры:", e);
        }
        return;
    }

    // Сценарий 3: Выбран плащ (с элитрами или без)
    if (currentCapeFilename) {
        try {
            const capeBlobUrl = await getDecryptedBlobUrl(currentCapeFilename);
            
            if (elytraEnabled) {
                // Если включен плащ + элитры, skinview3d автоматически натянет текстуру плаща на крылья элитр!
                await skinViewer.loadCape(capeBlobUrl, { backEquipment: 'elytra' });
            } else {
                // Иначе просто отображаем классический плащ
                await skinViewer.loadCape(capeBlobUrl, { backEquipment: 'cape' });
            }

            // Очищаем Blob URL через секунду, чтобы разгрузить память браузера
            setTimeout(() => {
                if (capeBlobUrl.startsWith('blob:')) URL.revokeObjectURL(capeBlobUrl);
            }, 1000);

        } catch (err) {
            console.error("Ошибка при обновлении спины персонажа:", err);
        }
    }
}

// Загрузка и генерация иконок для плащей прямо из зашифрованных файлов
async function initCapePreviews() {
    const capesToLoad = ['migrator', 'pancake'];
    for (const cape of capesToLoad) {
        try {
            const blobUrl = await getDecryptedBlobUrl(cape);
            const img = document.getElementById(`img-preview-${cape}`);
            if (img) {
                img.src = blobUrl;
                img.style.display = 'block';
            }
        } catch (e) {
            console.warn(`Не удалось подготовить иконку для плаща: ${cape}`);
        }
    }
}

async function selectSkin(filename, updateUrl = true) {
    if (!skinViewer) return;
    const skin = globalSkins.find(s => s.filename === filename);
    if (!skin) return;

    currentActiveSkinFilename = filename;
    document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
    const currentItem = document.getElementById(`item-${filename}`);
    if (currentItem) currentItem.classList.add('active');

    try {
        // Загрузка и расшифровка скина
        const blobUrl = await getDecryptedBlobUrl(filename);
        await skinViewer.loadSkin(blobUrl, skin.model === 'alex' ? 'slim' : 'default');
        
        // Очистка памяти
        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);

        applyAnimation();
        if (window.refreshLayers) window.refreshLayers();

        // Обновление информации
        document.getElementById('infoCustomer').textContent = skin.customer || 'Не указан';
        document.getElementById('infoDate').textContent = skin.date || 'Не указана';

        // БЛОК АВТОРА:
        const authorContainer = document.getElementById('infoAuthor');
        if (authorContainer) {
            if (skin.author) {
                if (skin.authorUrl) {
                    authorContainer.innerHTML = `<a href="${skin.authorUrl}" target="_blank" onclick="event.stopPropagation();" style="color: var(--accent); text-decoration: underline; font-weight: 600; cursor: pointer;">${skin.author}</a>`;
                } else {
                    authorContainer.textContent = skin.author;
                }
            } else {
                authorContainer.textContent = 'Не указан';
            }
        }

        if (updateUrl) {
            const baseUrl = window.location.origin + window.location.pathname;
            window.history.pushState({}, '', `${baseUrl}?skin=${filename}`);
        }
    } catch (err) {
        console.error("Ошибка расшифровки скина:", err);
    }
}

        async function drawSkinAvatar(filename, canvasElement) {
    try {
        const blobUrl = await getDecryptedBlobUrl(filename);
        const img = new Image();
        img.src = blobUrl;
        img.onload = () => {
            const ctx = canvasElement.getContext('2d');
            ctx.imageSmoothingEnabled = false; 
            // Рисуем лицо (оба слоя)
            ctx.drawImage(img, 8, 8, 8, 8, 0, 0, 64, 64);
            ctx.drawImage(img, 40, 8, 8, 8, 0, 0, 64, 64);
            URL.revokeObjectURL(blobUrl);
        };
    } catch (e) {
        console.log("Не удалось загрузить миниатюру");
    }
}

        function applyAnimation() {
            if (!skinViewer) return;
            skinViewer.animation = null;
            if (currentAnimationType === 'walk') skinViewer.animation = new skinview3d.WalkingAnimation();
            if (currentAnimationType === 'run') skinViewer.animation = new skinview3d.RunningAnimation();
            if (currentAnimationType === 'fly') skinViewer.animation = new skinview3d.FlyingAnimation();
            
            // Накатываем текущую сохраненную скорость на вновь созданную анимацию
            if (skinViewer.animation) {
                skinViewer.animation.speed = currentAnimationSpeed;
                skinViewer.animation.paused = document.getElementById('pause_animation').checked;
            }
        }

        /* БЕЗОПАСНЫЙ ПАРСИНГ ДАТЫ (ДЛЯ ОБРАБОТКИ ПРИКОЛОВ В JSON) */
        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split('.');
            if (parts.length === 3) {
                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10) - 1;
                const year = parseInt(parts[2], 10);
                if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                    return new Date(year, month, day);
                }
            }
            return new Date(0); 
        }

        /* ФУНКЦИЯ СОРТИРОВКИ И ОТРИСОВКИ СПИСКА */
        function renderSkinList() {
            const list = document.getElementById('skinList');
            if (!list) return;
            list.innerHTML = '';

            let sortedSkins = [...globalSkins];

            // 1. Сортировка базового массива
            sortedSkins.sort((a, b) => {
                let valA, valB;

                if (currentSortField === 'name') {
                    valA = a.skinName || '';
                    valB = b.skinName || '';
                } else if (currentSortField === 'author') {
                    valA = a.author || '';
                    valB = b.author || '';
                } else if (currentSortField === 'date') {
                    const dA = parseDate(a.date);
                    const dB = parseDate(b.date);
                    if (dA.getTime() === dB.getTime()) {
                        valA = a.date || '';
                        valB = b.date || '';
                    } else {
                        valA = dA.getTime();
                        valB = dB.getTime();
                    }
                }

                if (valA < valB) return currentSortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortOrder === 'asc' ? 1 : -1;

                // Дополнительная сортировка по имени, если критерии равны
                if (currentSortField !== 'name') {
                    return (a.skinName || '').localeCompare(b.skinName || '');
                }
                return 0;
            });

            // 2. Генерация элементов с поддержкой разделителей авторов
            let lastAuthor = null;

            sortedSkins.forEach(skin => {
                // Если выбрана сортировка по автору, создаем черточки-разделения групп
                if (currentSortField === 'author' && skin.author !== lastAuthor) {
                    lastAuthor = skin.author;
                    const header = document.createElement('div');
                    header.classList.add('author-group-header');
                    header.textContent = lastAuthor || 'Не указан';
                    list.appendChild(header);
                }

                const cleanFilename = skin.filename.replace(/\.(png|PNG)$/, "");
                const skinPath = `skins/${cleanFilename}.png`;

                const item = document.createElement('div');
                item.classList.add('skin-item');
                item.id = `item-${skin.filename}`;
                
                if (skin.filename === currentActiveSkinFilename) {
                    item.classList.add('active');
                }
                
                item.innerHTML = `
                    <canvas class="canvas-avatar" width="64" height="64"></canvas>
                    <span class="skin-name">${skin.skinName || 'Без названия'}</span>
                    <span class="skin-date">${skin.date || ''}</span>
                `;
                
                list.appendChild(item);
                
        
const canvas = item.querySelector('.canvas-avatar');
drawSkinAvatar(skin.filename, canvas);

                item.onclick = () => selectSkin(skin.filename, true);
            });

            // Технические распорки для красивой сетки плитки
            for(let i = 0; i < 4; i++) {
                const spacer = document.createElement('div');
                spacer.classList.add('grid-spacer');
                list.appendChild(spacer);
            }
        }

        /* ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА СОРТИРОВКИ */
        function initSortListeners() {
            const trigger = document.getElementById('sortTrigger');
            const menu = document.getElementById('sortMenu');

            if (!trigger || !menu) return;

            // Показ / скрытие менюшки по клику
            trigger.onclick = (e) => {
                e.stopPropagation();
                menu.classList.toggle('show');
                trigger.classList.toggle('active');
            };

            // Скрытие при клике по экрану
            document.addEventListener('click', () => {
                menu.classList.remove('show');
                trigger.classList.remove('active');
            });

            // Обновление чекбоксов-точек при кликах на пункты
            const updateMenuSelectionVisuals = () => {
                menu.querySelectorAll('.dropdown-item').forEach(item => {
                    const field = item.getAttribute('data-field');
                    const order = item.getAttribute('data-order');
                    
                    if ((field && field === currentSortField) || (order && order === currentSortOrder)) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            };

            menu.querySelectorAll('.dropdown-item').forEach(item => {
                item.onclick = (e) => {
                    e.stopPropagation();
                    
                    const field = item.getAttribute('data-field');
                    const order = item.getAttribute('data-order');

                    if (field) currentSortField = field;
                    if (order) currentSortOrder = order;

                    updateMenuSelectionVisuals();
                    renderSkinList(); // Моментальный перерендер с новой сортировкой
                };
            });

            updateMenuSelectionVisuals();
        }

        function initControlListeners() {
            document.getElementById('reset_all').onclick = () => {
                if (!skinViewer) return;
                
                skinViewer.autoRotate = false;
                document.getElementById('auto_rotate').checked = false;
                
                // Сброс паузы анимации
                document.getElementById('pause_animation').checked = false;
                
                // Сброс значений и ползунков к дефолтным (1.0)
                currentRotationSpeed = 1.0;
                skinViewer.autoRotateSpeed = currentRotationSpeed;
                document.getElementById('rotate_speed').value = 1.0;
                document.getElementById('rotate_speed_val').textContent = '1.0';
                
                currentAnimationSpeed = 1.0;
                if (skinViewer.animation) {
                    skinViewer.animation.speed = currentAnimationSpeed;
                    skinViewer.animation.paused = false;
                }
                document.getElementById('anim_speed').value = 1.0;
                document.getElementById('anim_speed_val').textContent = '1.0';
                
                if (skinViewer.playerObject) {
                    skinViewer.playerObject.rotation.x = 0;
                    skinViewer.playerObject.rotation.y = 0;
                    skinViewer.playerObject.rotation.z = 0;
                }

                // Сброс плаща и элитр
                currentCapeFilename = null;
                elytraEnabled = false;
                document.getElementById('elytra_toggle').checked = false;
                document.querySelectorAll('.cape-item').forEach(el => el.classList.remove('active'));
                document.getElementById('cape-none').classList.add('active');
                skinViewer.loadCape(null);
                
                skinViewer.controls.reset();
                skinViewer.controls.alpha = 0; 
                skinViewer.controls.beta = 0;
                skinViewer.controls.target.set(0, -2, 0); 
                skinViewer.camera.position.set(0, 0, 60);
            };

            document.getElementById('auto_rotate').onchange = (e) => skinViewer.autoRotate = e.target.checked;

            // Обработчик чекбокса паузы анимации
            document.getElementById('pause_animation').onchange = (e) => {
                if (skinViewer && skinViewer.animation) {
                    skinViewer.animation.paused = e.target.checked;
                }
            };

            // Обработчик изменения скорости вращения
            const rotateSpeedInput = document.getElementById('rotate_speed');
            const rotateSpeedVal = document.getElementById('rotate_speed_val');
            rotateSpeedInput.oninput = (e) => {
                currentRotationSpeed = parseFloat(e.target.value);
                rotateSpeedVal.textContent = currentRotationSpeed.toFixed(1);
                if (skinViewer) skinViewer.autoRotateSpeed = currentRotationSpeed;
            };

            document.querySelectorAll('input[name="animation"]').forEach(radio => {
                radio.onchange = (e) => {
                    currentAnimationType = e.target.value;
                    if (currentActiveSkinFilename) {
                        selectSkin(currentActiveSkinFilename, false); 
                    } else {
                        applyAnimation();
                    }
                };
            });

            // Обработчик изменения скорости анимации
            const animSpeedInput = document.getElementById('anim_speed');
            const animSpeedVal = document.getElementById('anim_speed_val');
            animSpeedInput.oninput = (e) => {
                currentAnimationSpeed = parseFloat(e.target.value);
                animSpeedVal.textContent = currentAnimationSpeed.toFixed(1);
                if (skinViewer && skinViewer.animation) {
                    skinViewer.animation.speed = currentAnimationSpeed;
                }
            };

            const updateLayers = () => {
                if (!skinViewer) return;
                const headVisible = document.getElementById('layer_head').checked;
                const bodyVisible = document.getElementById('layer_body').checked;
                skinViewer.playerObject.skin.head.outerLayer.visible = headVisible;
                skinViewer.playerObject.skin.body.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.leftArm.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.rightArm.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.leftLeg.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.rightLeg.outerLayer.visible = bodyVisible;
            };

            document.getElementById('layer_head').onchange = updateLayers;
            document.getElementById('layer_body').onchange = updateLayers;
            window.refreshLayers = updateLayers;

            // --- ОБРАБОТЧИКИ НАЖАТИЙ НА ПЛАЩИ И ЭЛИТРЫ ---
            document.getElementById('elytra_toggle').onchange = async (e) => {
                elytraEnabled = e.target.checked;
                await updateBackEquipment();
            };

            document.getElementById('cape-none').onclick = async () => {
                currentCapeFilename = null;
                document.querySelectorAll('.cape-item').forEach(el => el.classList.remove('active'));
                document.getElementById('cape-none').classList.add('active');
                await updateBackEquipment();
            };

            document.querySelectorAll('.cape-icon-wrapper').forEach(item => {
                item.onclick = async () => {
                    const capeName = item.getAttribute('data-cape');
                    currentCapeFilename = capeName;
                    
                    document.querySelectorAll('.cape-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    
                    await updateBackEquipment();
                };
            });

            document.getElementById('btnListView').onclick = () => {
                document.getElementById('btnListView').classList.add('active');
                document.getElementById('btnGridView').classList.remove('active');
                document.getElementById('skinList').className = 'skin-list view-list';
            };
            document.getElementById('btnGridView').onclick = () => {
                document.getElementById('btnGridView').classList.add('active');
                document.getElementById('btnListView').classList.remove('active');
                document.getElementById('skinList').className = 'skin-list view-grid';
            };
        }

        async function loadSkinsJSON() {
            try {
                const response = await fetch('skins.json?v=' + Math.random());
                globalSkins = await response.json();

                const params = new URLSearchParams(window.location.search);
                let activeSkin = params.get('skin');

                if (!activeSkin || !globalSkins.some(s => s.filename === activeSkin)) {
                    activeSkin = globalSkins.length > 0 ? globalSkins[0].filename : null;
                }
                
                currentActiveSkinFilename = activeSkin;

                initViewer();
                initSortListeners();
                renderSkinList();

                if (currentActiveSkinFilename) {
                    selectSkin(currentActiveSkinFilename, false);
                }

            } catch (err) {
                document.getElementById('loading').textContent = "Не удалось прочесть список skins.json";
            }
        }

        window.onload = loadSkinsJSON;
