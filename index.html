<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Галерея скинов</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            margin: 0 !important;
            padding: 0;
            display: flex;
            flex-direction: row;
            background-color: #121214;
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            background-color: #1a1a1e;
            border-right: 1px solid #29292e;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #sidebar h2 {
            margin-top: 0;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        .skin-list {
            flex: 1;
            overflow-y: auto;
        }

        .skin-item {
            padding: 12px;
            background: #202024;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            font-size: 14px;
        }

        .skin-item:hover {
            background: #29292e;
        }

        .skin-item.active {
            background: #04d361;
            color: #000;
            font-weight: bold;
        }

        #viewer_container_zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, #29292e 0%, #121214 100%);
        }

        #skin_container {
            width: 500px;
            height: 500px;
            outline: none;
        }

        #loading {
            position: absolute;
            font-size: 18px;
            color: #04d361;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Скины</h2>
        <div class="skin-list" id="skinList"></div>
    </div>

    <div id="viewer_container_zone">
        <div id="loading">Создание 3D сцены...</div>
        <div id="skin_container"></div>
    </div>

    <script>
        let scene, camera, renderer, skinMesh;

        document.addEventListener('contextmenu', event => event.preventDefault());

        function init3D() {
            const container = document.getElementById('skin_container');
            
            // Сцена
            scene = new THREE.Scene();

            // Камера
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(0, 0, 5);

            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(500, 500);
            container.appendChild(renderer.domElement);

            // Свет
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.4);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Создаем болванку персонажа (куб вместо сложной модельки, чтобы обойти баги библиотек)
            const geometry = new THREE.BoxGeometry(1, 2, 0.5);
            const material = new THREE.MeshStandardMaterial({ color: 0x555555 });
            skinMesh = new THREE.Mesh(geometry, material);
            scene.add(skinMesh);

            document.getElementById('loading').style.display = 'none';

            // Анимация вращения
            function animate() {
                requestAnimationFrame(animate);
                if (skinMesh) skinMesh.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        }

        async function loadSkins() {
            try {
                const response = await fetch('skins.json');
                const skins = await response.json();
                const listContainer = document.getElementById('skinList');

                skins.forEach((skin, index) => {
                    const item = document.createElement('div');
                    item.classList.add('skin-item');
                    if (index === 0) item.classList.add('active');
                    
                    item.textContent = `${skin.skinName} (${skin.customer})`;
                    
                    item.onclick = () => {
                        document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        selectSkin(skin);
                    };

                    listContainer.appendChild(item);
                });

                init3D();
                if (skins.length > 0) {
                    selectSkin(skins[0]);
                }
            } catch (error) {
                document.getElementById('loading').textContent = "Ошибка загрузки списка скинов.";
            }
        }

        function selectSkin(skin) {
            if (!skinMesh) return;

            const skinPath = `skins/${skin.filename}.png`;
            const textureLoader = new THREE.TextureLoader();
            
            // Загружаем текстуру напрямую
            textureLoader.load(skinPath, function(texture) {
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                skinMesh.material.map = texture;
                skinMesh.material.needsUpdate = true;
            }, undefined, function(err) {
                console.error("Ошибка загрузки файла изображения скина.");
            });

            // Автокопирование ссылки для Excel
            const baseUrl = window.location.href.split('?')[0];
            const currentSkinUrl = `${baseUrl}?skin=${skin.filename}`;
            navigator.clipboard.writeText(currentSkinUrl).catch(() => {});
        }

        window.onload = loadSkins;
    </script>
</body>
</html>
