<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Галерея скинов</title>
    
    <script src="https://unpkg.com/skinview3d@3.4.2/dist/skinview3d.bundle.js"></script>

    <style>
        body {
            margin: 0 !important;
            padding: 0;
            display: flex;
            flex-direction: row;
            background-color: #121214;
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            background-color: #1a1a1e;
            border-right: 1px solid #29292e;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #sidebar h2 {
            margin-top: 0;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        .skin-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .skin-item {
            padding: 12px;
            background: #202024;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            font-size: 14px;
        }

        .skin-item:hover {
            background: #29292e;
        }

        .skin-item.active {
            background: #04d361;
            color: #000;
            font-weight: bold;
        }

        #viewer_container_zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, #29292e 0%, #121214 100%);
        }

        #skin_container {
            width: 600px;
            height: 600px;
            outline: none;
        }

        #loading {
            position: absolute;
            font-size: 18px;
            color: #04d361;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Скины</h2>
        <div class="skin-list" id="skinList"></div>
    </div>

    <div id="viewer_container_zone">
        <div id="loading">Загрузка 3D модели...</div>
        <canvas id="skin_container"></canvas>
    </div>

    <script>
        let skinViewer = null;

        document.addEventListener('contextmenu', event => event.preventDefault());

        function initViewer() {
            if (!window.skinview3d) {
                document.getElementById('loading').textContent = "Ошибка: Скрипт заблокирован вашим провайдером или браузером.";
                return;
            }

            try {
                skinViewer = new skinview3d.SkinViewer({
                    canvas: document.getElementById('skin_container'),
                    width: 600,
                    height: 600
                });

                skinViewer.controls.enableRotate = true;
                skinViewer.controls.enableZoom = true;
                
                // Добавляем дефолтное вращение и анимацию ходьбы
                skinViewer.animations.add(skinview3d.AutoRotateAnimation).speed = 0.5;
                skinViewer.animations.add(skinview3d.WalkingAnimation).speed = 0.6;

                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                console.error(e);
                document.getElementById('loading').textContent = "Ошибка инициализации 3D сцены.";
            }
        }

        async function loadSkins() {
            try {
                const response = await fetch('skins.json');
                const skins = await response.json();
                const listContainer = document.getElementById('skinList');

                skins.forEach((skin, index) => {
                    const item = document.createElement('div');
                    item.classList.add('skin-item');
                    if (index === 0) item.classList.add('active');
                    
                    item.textContent = `${skin.skinName} (${skin.customer})`;
                    
                    item.onclick = () => {
                        document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        selectSkin(skin);
                    };

                    listContainer.appendChild(item);
                });

                initViewer();
                if (skins.length > 0 && skinViewer) {
                    selectSkin(skins[0]);
                }
            } catch (error) {
                document.getElementById('loading').textContent = "Ошибка парсинга skins.json.";
            }
        }

        function selectSkin(skin) {
            if (!skinViewer) return;

            const skinPath = `skins/${skin.filename}.png`;
            
            try {
                skinViewer.loadSkin(skinPath, {
                    model: skin.model === "alex" ? "slim" : "default"
                });
            } catch(e) {
                console.error("Не удалось подгрузить файл скина:", e);
            }

            // Копирование ссылки в буфер обмена для Excel
            const baseUrl = window.location.href.split('?')[0];
            const currentSkinUrl = `${baseUrl}?skin=${skin.filename}`;
            navigator.clipboard.writeText(currentSkinUrl).catch(() => {});
        }

        window.onload = loadSkins;
    </script>
</body>
</html>
