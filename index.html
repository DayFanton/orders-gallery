<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея 3D Скинов</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://bs-community.github.io/skinview3d/js/skinview3d.bundle.js"></script>

    <style>
        :root {
            --bg-main: #0b0b0d;
            --bg-sidebar: #131316;
            --bg-card: #1c1c21;
            --bg-hover: #26262b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #10b981;
            --border: #27272a;
        }

        body {
            margin: 0 !important;
            padding: 0;
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #sidebar {
            width: 320px; /* Дефолтная ширина */
            min-width: 260px; /* Оставляем только минимальную, чтобы не сжимать в ноль */
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        /* Интерактивный ползунок изменения ширины панели */
        #resize_handle {
            position: absolute;
            top: 0;
            right: -4px;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            z-index: 20;
            background: transparent;
            transition: background 0.2s;
        }
        #resize_handle:hover, #resize_handle.resizing {
            background: rgba(16, 185, 129, 0.4);
        }

        .sidebar-header {
            padding: 20px 24px 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            padding: 2px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .toggle-btn.active {
            background: var(--bg-hover);
            color: #fff;
        }

        .skin-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            box-sizing: border-box;
        }

        /* РЕЖИМ СПИСОК */
        .skin-list.view-list {
            display: flex !important;
            flex-direction: column !important;
        }
        .skin-list.view-list .skin-item {
            display: flex !important;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-card);
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            width: 100% !important;
            height: auto !important;
            box-sizing: border-box;
        }
        .skin-list.view-list .canvas-avatar { display: none !important; }
        .skin-list.view-list .skin-date { font-size: 0.75rem; color: var(--text-muted); display: inline !important; margin-left: 8px; flex-shrink: 0; }
        .skin-list.view-list .skin-name { text-align: left; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; flex: 1; }

        /* РЕЖИМ ПЛИТКИ (Умная адаптивная сетка без зазоров) */
        .skin-list.view-grid {
            display: grid !important;
            /* Квадраты автоматически растут от 80px до упора, пока не влезет новый столбец */
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)) !important;
            gap: 8px !important;
            padding-bottom: 16px;
            align-content: flex-start;
        }
        .skin-list.view-grid .skin-item {
            background: var(--bg-card) !important;
            border: 1px solid transparent;
            border-radius: 8px;
            
            /* Убираем жесткую ширину, оставляя только пропорцию 1:1 (квадрат) */
            width: 100% !important;          
            aspect-ratio: 1 / 1 !important;
            
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer;
            padding: 6px !important;
            box-sizing: border-box !important;
            transition: background 0.2s ease, border-color 0.2s ease;
            margin-bottom: 0 !important;
        }
        /* Старые распорки-пустышки больше не нужны, CSS Grid всё делает сам */
        .skin-list.view-grid .grid-spacer {
            display: none !important;
        }
        .skin-list.view-grid .canvas-avatar {
            display: block !important;
            width: 42px !important;
            height: 42px !important;
            border-radius: 4px;
            background: #27272a;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 4px !important;
            flex-shrink: 0 !important;
        }
        .skin-list.view-grid .skin-name {
            font-size: 0.7rem !important;
            font-weight: 500;
            text-align: center !important;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            width: 100% !important;
            display: block !important;
        }
        .skin-list.view-grid .skin-date {
            display: none !important; 
        }

        .skin-list .skin-item:hover { background: var(--bg-hover); }
        .skin-list .skin-item.active { background: rgba(16, 185, 129, 0.08); border-color: var(--accent); }

        .meta-info {
            padding: 20px 24px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .meta-row {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-label { color: var(--text-muted); }
        .meta-value { font-weight: 500; color: #fff; background: var(--bg-card); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); max-width: 60%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        #viewer_zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: background 0.4s ease;
        }

        #skin_container {
            width: 100%;
            height: 100%;
            outline: none;
            cursor: grab;
        }

        #skin_container:active { cursor: grabbing; }

        #controls_panel {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .controls-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .control-group {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .control-group h3 {
            margin: 0 0 12px 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
        }

        .btn {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .checkbox-label input {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .radio-btn input { position: absolute; opacity: 0; width: 0; height: 0; }
        .radio-btn span {
            display: block;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .radio-btn input:checked + span {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .bg-selector-group {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid var(--border);
        }

        .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .bg-dot {
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .bg-dot:hover { transform: scale(1.05); }
        .bg-dot.active { border-color: #fff; }

        #loading {
            position: absolute;
            font-size: 0.9rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="resize_handle"></div>
        <div class="sidebar-header">
            <span class="section-title">Галерея</span>
            <div class="view-toggle">
                <button class="toggle-btn active" id="btnListView">Список</button>
                <button class="toggle-btn" id="btnGridView">Плитка</button>
            </div>
        </div>
        <div class="skin-list view-list" id="skinList"></div>
        
        <div class="meta-info">
            <div class="meta-row">
                <span class="meta-label">Заказчик</span>
                <span class="meta-value" id="infoCustomer">—</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Художник</span>
                <span class="meta-value" id="infoAuthor">—</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Дата создания</span>
                <span class="meta-value" id="infoDate">—</span>
            </div>
        </div>
    </div>

    <div id="viewer_zone">
        <div id="loading">Загрузка модулей визуализации...</div>
        <canvas id="skin_container"></canvas>
    </div>

    <div id="controls_panel">
        <div class="controls-scroll">
            <div class="control-group">
                <button class="btn" id="reset_all">Сбросить камеру</button>
            </div>

            <div class="control-group">
                <h3>Вращение</h3>
                <label class="checkbox-label">
                    <input type="checkbox" id="auto_rotate">
                    <span>Вращать модель</span>
                </label>
            </div>

            <div class="control-group">
                <h3>Анимация движения</h3>
                <div class="radio-grid">
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="none" checked>
                        <span>Покой</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="walk">
                        <span>Ходьба</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="run">
                        <span>Бег</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="animation" value="fly">
                        <span>Полет</span>
                    </label>
                </div>
            </div>

            <div class="control-group">
                <h3>Отображение слоев</h3>
                <label class="checkbox-label">
                    <input type="checkbox" id="layer_head" checked>
                    <span>Головной убор / Волосы</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="layer_body" checked>
                    <span>Верхняя одежда / Броня</span>
                </label>
            </div>
        </div>

        <div class="bg-selector-group">
            <span class="section-title" style="padding:0;">Цвет фона</span>
            <div class="bg-grid" id="bgGrid"></div>
        </div>
    </div>

    <script>
        let skinViewer = null;
        let globalSkins = [];
        let currentAnimationType = 'none';

        const bgPresets = [
            { name: 'Тёмный', value: 'radial-gradient(circle at center, #1c1c24 0%, #0b0b0d 100%)', color: '#1c1c24' },
            { name: 'Светлый', value: 'radial-gradient(circle at center, #f4f4f5 0%, #e4e4e7 100%)', color: '#e4e4e7' },
            { name: 'Тёмно-фиолетовый', value: 'radial-gradient(circle at center, #2e1065 0%, #0f052d 100%)', color: '#2e1065' },
            { name: 'Тёмно-красный', value: 'radial-gradient(circle at center, #4c0519 0%, #18000a 100%)', color: '#4c0519' },
            { name: 'Тёмно-розовый', value: 'radial-gradient(circle at center, #500732 0%, #1c0010 100%)', color: '#500732' },
            { name: 'Тёмно-жёлтый', value: 'radial-gradient(circle at center, #422006 0%, #150a00 100%)', color: '#422006' },
            { name: 'Тёмно-синий', value: 'radial-gradient(circle at center, #172554 0%, #050b24 100%)', color: '#172554' }
        ];

        document.addEventListener('contextmenu', e => e.preventDefault());

        function initViewer() {
            try {
                const container = document.getElementById('viewer_zone');
                skinViewer = new skinview3d.SkinViewer({
                    canvas: document.getElementById('skin_container'),
                    width: container.clientWidth,
                    height: container.clientHeight
                });

                skinViewer.controls.enableRotate = true;
                skinViewer.controls.enableZoom = true;
                skinViewer.controls.enablePan = true; 
                
                skinViewer.globalLight.intensity = 3.0; 
                skinViewer.cameraLight.intensity = 0.6;
                skinViewer.autoRotate = false;

                container.style.background = bgPresets[0].value;
                document.getElementById('loading').style.display = 'none';

                window.addEventListener('resize', () => {
                    updateViewerSize();
                });

                initControlListeners();
                initResizeSidebar();
                buildBackgroundSelector();

            } catch (e) {
                console.error(e);
                document.getElementById('loading').textContent = "Ошибка инициализации 3D компонентов.";
            }
        }

        function updateViewerSize() {
            if (!skinViewer) return;
            const container = document.getElementById('viewer_zone');
            skinViewer.width = container.clientWidth;
            skinViewer.height = container.clientHeight;
        }

        // АБСОЛЮТНЫЙ ФИКС РЕСАЙЗА (Снятие выделения и браузерного Drag-and-Drop)
        function initResizeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const handle = document.getElementById('resize_handle');
            const canvas = document.getElementById('skin_container');
            const viewerZone = document.getElementById('viewer_zone');
            let isResizing = false;

            // Функция, блокирующая стандартное поведение браузера при перетаскивании
            function preventDefaults(e) {
                if (isResizing) {
                    e.preventDefault();
                }
            }

            handle.addEventListener('mousedown', (e) => {
                isResizing = true;
                handle.classList.add('resizing');
                
                // Ставим принудительный стиль курсора для всего экрана
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none'; 
                document.body.style.webkitUserSelect = 'none';
                
                // Полностью отключаем реакцию 3D-зоны на клики/мышь
                viewerZone.style.pointerEvents = 'none';
                if(canvas) canvas.style.pointerEvents = 'none';
                
                // Блокируем браузерное выделение и перетаскивание картинок/текста
                window.addEventListener('selectstart', preventDefaults);
                window.addEventListener('dragstart', preventDefaults);
                
                e.preventDefault();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                let newWidth = e.clientX;
                const maxAllowedWidth = window.innerWidth / 2;
                
                if (newWidth < 260) newWidth = 260;
                if (newWidth > maxAllowedWidth) newWidth = maxAllowedWidth;
                
                sidebar.style.width = `${newWidth}px`; 
                
                updateViewerSize();
            });

            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    handle.classList.remove('resizing');
                    
                    // Возвращаем стандартные настройки браузера
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = 'auto'; 
                    document.body.style.webkitUserSelect = 'auto';
                    
                    viewerZone.style.pointerEvents = 'auto';
                    if(canvas) canvas.style.pointerEvents = 'auto';
                    
                    // Снимаем блокировки выделения
                    window.removeEventListener('selectstart', preventDefaults);
                    window.removeEventListener('dragstart', preventDefaults);
                }
            });
        }

        function buildBackgroundSelector() {
            const grid = document.getElementById('bgGrid');
            bgPresets.forEach((bg, idx) => {
                const dot = document.createElement('div');
                dot.classList.add('bg-dot');
                if (idx === 0) dot.classList.add('active');
                dot.style.backgroundColor = bg.color;
                dot.title = bg.name;
                
                dot.onclick = () => {
                    document.querySelectorAll('.bg-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    document.getElementById('viewer_zone').style.background = bg.value;
                };
                grid.appendChild(dot);
            });
        }

        function drawSkinAvatar(imgUrl, canvasElement) {
            const img = new Image();
            img.src = imgUrl;
            img.onload = () => {
                const ctx = canvasElement.getContext('2d');
                ctx.imageSmoothingEnabled = false; 
                ctx.drawImage(img, 8, 8, 8, 8, 0, 0, 64, 64);
                ctx.drawImage(img, 40, 8, 8, 8, 0, 0, 64, 64);
            };
        }

        function applyAnimation() {
            if (!skinViewer) return;
            skinViewer.animation = null;
            if (currentAnimationType === 'walk') skinViewer.animation = new skinview3d.WalkingAnimation();
            if (currentAnimationType === 'run') skinViewer.animation = new skinview3d.RunningAnimation();
            if (currentAnimationType === 'fly') skinViewer.animation = new skinview3d.FlyingAnimation();
        }

        function initControlListeners() {
            document.getElementById('reset_all').onclick = () => {
                if (!skinViewer) return;
                skinViewer.autoRotate = false;
                document.getElementById('auto_rotate').checked = false;
                skinViewer.controls.reset();
                skinViewer.controls.alpha = 0; 
                skinViewer.controls.beta = 0;
                skinViewer.controls.target.set(0, -2, 0); 
                skinViewer.camera.position.set(0, 0, 60);
            };

            document.getElementById('auto_rotate').onchange = (e) => skinViewer.autoRotate = e.target.checked;

            document.querySelectorAll('input[name="animation"]').forEach(radio => {
                radio.onchange = (e) => {
                    currentAnimationType = e.target.value;
                    const activeItem = document.querySelector('.skin-item.active');
                    if (activeItem) {
                        selectSkin(activeItem.id.replace('item-', ''), false); 
                    } else {
                        applyAnimation();
                    }
                };
            });

            const updateLayers = () => {
                if (!skinViewer) return;
                const headVisible = document.getElementById('layer_head').checked;
                const bodyVisible = document.getElementById('layer_body').checked;
                skinViewer.playerObject.skin.head.outerLayer.visible = headVisible;
                skinViewer.playerObject.skin.body.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.leftArm.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.rightArm.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.leftLeg.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.rightLeg.outerLayer.visible = bodyVisible;
            };

            document.getElementById('layer_head').onchange = updateLayers;
            document.getElementById('layer_body').onchange = updateLayers;
            window.refreshLayers = updateLayers;

            document.getElementById('btnListView').onclick = () => {
                document.getElementById('btnListView').classList.add('active');
                document.getElementById('btnGridView').classList.remove('active');
                document.getElementById('skinList').className = 'skin-list view-list';
            };
            document.getElementById('btnGridView').onclick = () => {
                document.getElementById('btnGridView').classList.add('active');
                document.getElementById('btnListView').classList.remove('active');
                document.getElementById('skinList').className = 'skin-list view-grid';
            };
        }

        async function loadSkinsJSON() {
            try {
                const response = await fetch('skins.json?v=' + Math.random());
                globalSkins = await response.json();
                const list = document.getElementById('skinList');
                list.innerHTML = ''; 

                globalSkins.forEach(skin => {
                    const cleanFilename = skin.filename.replace(/\.(png|PNG)$/, "");
                    const skinPath = `skins/${cleanFilename}.png`;

                    const item = document.createElement('div');
                    item.classList.add('skin-item');
                    item.id = `item-${skin.filename}`;
                    
                    item.innerHTML = `
                        <canvas class="canvas-avatar" width="64" height="64"></canvas>
                        <span class="skin-name">${skin.skinName || 'Без названия'}</span>
                        <span class="skin-date">${skin.date || ''}</span>
                    `;
                    
                    list.appendChild(item);
                    
                    const canvas = item.querySelector('.canvas-avatar');
                    drawSkinAvatar(skinPath, canvas);

                    item.onclick = () => selectSkin(skin.filename, true);
                });

                // Добавляем невидимые распорки-пустышки для красивой симметрии флексбокса
                for(let i = 0; i < 4; i++) {
                    const spacer = document.createElement('div');
                    spacer.classList.add('grid-spacer');
                    list.appendChild(spacer);
                }

                initViewer();

                const params = new URLSearchParams(window.location.search);
                const activeSkin = params.get('skin');

                if (activeSkin && globalSkins.some(s => s.filename === activeSkin)) {
                    selectSkin(activeSkin, false);
                } else if (globalSkins.length > 0) {
                    selectSkin(globalSkins[0].filename, false);
                }

            } catch (err) {
                document.getElementById('loading').textContent = "Не удалось прочесть список skins.json";
            }
        }

        function selectSkin(filename, updateUrl = true) {
            if (!skinViewer) return;
            const skin = globalSkins.find(s => s.filename === filename);
            if (!skin) return;

            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            const currentItem = document.getElementById(`item-${filename}`);
            if (currentItem) currentItem.classList.add('active');

            const cleanFilename = filename.replace(/\.(png|PNG)$/, "");
            const skinPath = `skins/${cleanFilename}.png`;
            
            skinViewer.loadSkin(skinPath, skin.model === 'alex' ? 'slim' : 'default').then(() => {
                applyAnimation();
                if (window.refreshLayers) window.refreshLayers();
            });

            document.getElementById('infoCustomer').textContent = skin.customer || 'Не указан';
            document.getElementById('infoAuthor').textContent = skin.author || 'Не указан';
            document.getElementById('infoDate').textContent = skin.date || 'Не указана';

            if (updateUrl) {
                const baseUrl = window.location.origin + window.location.pathname;
                window.history.pushState({}, '', `${baseUrl}?skin=${filename}`);
            }
        }

        window.onload = loadSkinsJSON;
    </script>
</body>
</html>
