<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея скинов</title>
    <script src="https://bundle.run/skinview3d@1.6.0"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Боковая панель со списком */
        #sidebar {
            width: 300px;
            background-color: #1a1a1e;
            border-right: 1px solid #29292e;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #fff; margin-bottom: 15px; }
        .skin-list {
            flex: 1;
            overflow-y: auto;
        }
        .skin-item {
            padding: 12px;
            background: #202024;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            font-size: 14px;
        }
        .skin-item:hover {
            background: #29292e;
        }
        .skin-item.active {
            background: #04d361;
            color: #000;
            font-weight: bold;
        }

        /* Зона 3D просмотра */
        #viewer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, #29292e 0%, #121214 100%);
        }
        canvas {
            outline: none;
        }
        #loading {
            position: absolute;
            font-size: 18px;
            color: #04d361;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Скины</h2>
        <div class="skin-list" id="skinList">
            </div>
    </div>

    <div id="viewer-container">
        <div id="loading">Загрузка 3D модели...</div>
        <canvas id="skin_container"></canvas>
    </div>

    <script>
        let skinViewer = null;

        // Блокируем правый клик мыши для базовой защиты картинок
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Инициализация 3D просмотрщика
        function initViewer() {
            const container = document.getElementById('skin_container');
            
            // В старых стабильных версиях библиотеки объект лежит в skinview3d.SkinViewer
            const ViewerClass = (typeof skinview3d !== 'undefined' && skinview3d.SkinViewer) || window.SkinViewer;
            
            if (!ViewerClass) {
                document.getElementById('loading').textContent = "Ошибка: 3D библиотека не загрузилась.";
                return;
            }

            skinViewer = new ViewerClass({
                canvas: container,
                width: 600,
                height: 600
            });

            // Настройки управления
            skinViewer.controls.enableRotate = true;
            skinViewer.controls.enableZoom = true;
            
            // Авто-вращение
            skinViewer.autoRotate = true;
            skinViewer.autoRotateSpeed = 0.5;

            // Живая анимация ходьбы
            skinViewer.animation = new skinview3d.WalkingAnimation();
            skinViewer.animation.speed = 0.6;
            
            document.getElementById('loading').style.display = 'none';
        }

        // Загрузка данных из skins.json
        async function loadSkins() {
            try {
                const response = await fetch('skins.json');
                const skins = await response.json();
                const listContainer = document.getElementById('skinList');

                skins.forEach((skin, index) => {
                    const item = document.createElement('div');
                    item.classList.add('skin-item');
                    if (index === 0) item.classList.add('active');
                    
                    item.textContent = `${skin.skinName} (${skin.customer})`;
                    
                    item.onclick = () => {
                        document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        selectSkin(skin);
                    };

                    listContainer.appendChild(item);
                });

                // Инициализируем плеер и загружаем первый скин
                initViewer();
                if (skins.length > 0 && skinViewer) {
                    selectSkin(skins[0]);
                }
            } catch (error) {
                console.error("Ошибка загрузки данных:", error);
                document.getElementById('loading').textContent = "Ошибка загрузки списка скинов.";
            }
        }

        // Переключение скина и скрытное копирование ссылки
        function selectSkin(skin) {
            if (!skinViewer) return;

            const skinPath = `skins/${skin.filename}.png`;
            
            // Загружаем текстуру
            skinViewer.loadSkin(skinPath, {
                model: skin.model === "alex" ? "slim" : "default"
            });

            // Скрытая фича ДЛЯ ТЕБЯ: при клике на скин, ссылка на него молча копируется в буфер обмена.
            // Заказчики об этом не знают, а тебе удобно сразу вставлять в Excel.
            const baseUrl = window.location.href.split('?')[0];
            const currentSkinUrl = `${baseUrl}?skin=${skin.filename}`;
            
            navigator.clipboard.writeText(currentSkinUrl).catch(err => {
                // Игнорируем ошибки копирования, чтобы пользователь ничего не заметил
            });
        }

        window.onload = loadSkins;
    </script>
</body>
</html>
