<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея скинов</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/skinview3d@2.1.1/dist/skinview3d.bundle.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 300px;
            background-color: #1a1a1e;
            border-right: 1px solid #29292e;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #fff; margin-bottom: 15px; }
        .skin-list {
            flex: 1;
            overflow-y: auto;
        }
        .skin-item {
            padding: 12px;
            background: #202024;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            font-size: 14px;
        }
        .skin-item:hover {
            background: #29292e;
        }
        .skin-item.active {
            background: #04d361;
            color: #000;
            font-weight: bold;
        }
        #viewer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, #29292e 0%, #121214 100%);
        }
        #loading {
            position: absolute;
            font-size: 18px;
            color: #04d361;
            pointer-events: none;
        }
        canvas {
            outline: none;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Скины</h2>
        <div class="skin-list" id="skinList">
            </div>
    </div>

    <div id="viewer-container">
        <div id="loading">Загрузка 3D модели...</div>
        <canvas id="skin_container"></canvas>
    </div>

    <script>
        let skinViewer = null;

        // Отключаем контекстное меню (базовая защита)
        document.addEventListener('contextmenu', event => event.preventDefault());

        function initViewer() {
            // В релизе 2.x объект находится прямо в window.skinview3d
            if (!window.skinview3d) {
                document.getElementById('loading').textContent = "Ошибка: Библиотека 3D не инициализирована.";
                return;
            }

            skinViewer = new skinview3d.SkinViewer({
                canvas: document.getElementById('skin_container'),
                width: 600,
                height: 600
            });

            // Настройка вращения и зума для этой версии
            skinViewer.controls.enableRotate = true;
            skinViewer.controls.enableZoom = true;
            
            // Запуск автоматического вращения
            skinViewer.autoRotate = true;
            skinViewer.autoRotateSpeed = 0.6;

            // Анимация ходьбы для версии 2.x
            skinViewer.animation = new skinview3d.WalkingAnimation();
            skinViewer.animation.speed = 0.6;

            document.getElementById('loading').style.display = 'none';
        }

        async function loadSkins() {
            try {
                const response = await fetch('skins.json');
                const skins = await response.json();
                const listContainer = document.getElementById('skinList');

                skins.forEach((skin, index) => {
                    const item = document.createElement('div');
                    item.classList.add('skin-item');
                    if (index === 0) item.classList.add('active');
                    
                    item.textContent = `${skin.skinName} (${skin.customer})`;
                    
                    item.onclick = () => {
                        document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        selectSkin(skin);
                    };

                    listContainer.appendChild(item);
                });

                // Сначала запускаем вьюер, затем загружаем первый скин
                initViewer();
                if (skins.length > 0 && skinViewer) {
                    selectSkin(skins[0]);
                }
            } catch (error) {
                console.error("Ошибка при старте галереи:", error);
                document.getElementById('loading').textContent = "Ошибка загрузки списка скинов.";
            }
        }

        function selectSkin(skin) {
            if (!skinViewer) return;

            const skinPath = `skins/${skin.filename}.png`;
            
            // Настройка модели под Стива или Алекс (тонкие руки)
            skinViewer.loadSkin(skinPath, {
                model: skin.model === "alex" ? "slim" : "default"
            });

            // Твой скрытый буфер обмена для Excel
            const baseUrl = window.location.href.split('?')[0];
            const currentSkinUrl = `${baseUrl}?skin=${skin.filename}`;
            navigator.clipboard.writeText(currentSkinUrl).catch(() => {});
        }

        window.onload = loadSkins;
    </script>
</body>
</html>
