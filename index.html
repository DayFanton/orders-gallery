<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея Заказов Скинов</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --accent: #00ca72;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 { text-align: center; font-weight: 600; margin-bottom: 30px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            cursor: pointer;
            border: 1px solid #2a2a2a;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card .customer { font-size: 12px; color: var(--accent); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .card .skin-name { font-size: 18px; margin: 8px 0; font-weight: bold; }
        .card .model-type { font-size: 12px; color: var(--text-muted); }
        
        #viewer-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 35px; color: white; cursor: pointer;
            background: none; border: none; z-index: 1001;
        }
        .close-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

    <h1>Каталог выполненных скинов</h1>
    <div class="gallery" id="gallery"></div>

    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">&times;</button>
        <div id="canvas-container"></div>
    </div>

    <script>
        let scene, camera, renderer, playerGroup;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        // Загружаем список из JSON
        fetch('skins.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.forEach(skin => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="customer">${skin.customer}</div>
                        <div class="skin-name">${skin.skinName}</div>
                        <div class="model-type">Формат: ${skin.model === 'slim' ? 'Алекс' : 'Стив'}</div>
                    `;
                    card.onclick = () => openViewer(skin.filename);
                    gallery.appendChild(card);
                });

                const urlParams = new URLSearchParams(window.location.search);
                const directSkin = urlParams.get('skin');
                if (directSkin) openViewer(directSkin);
            });

        function openViewer(filename) {
            document.getElementById('viewer-modal').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 30); // Центрируем камеру на уровне груди игрока

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Освещение (Исправлено имя конструктора!)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 15);
            scene.add(dirLight);

            playerGroup = new THREE.Group();

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(`skins/${filename}.png`, function(texture) {
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;

                const mat = new THREE.MeshStandardMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });

                // Функция для создания UV-развертки под кубы Майнкрафта
                function createPart(w, h, d, u, v, x, y, z) {
                    const geo = new THREE.BoxGeometry(w, h, d);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(x, y, z);
                    
                    // Настройка точных текстурных координат (простой маппинг)
                    const uvs = geo.attributes.uv;
                    for (let i = 0; i < uvs.count; i++) {
                        uvs.setXY(i, uvs.getX(i) * (w/64) + (u/64), uvs.getY(i) * (h/64) + (1 - (v+h)/64));
                    }
                    return mesh;
                }

                // Собираем полноценного 3D Стива по координатам классической развертки 64x64
                const head = createPart(8, 8, 8, 8, 8, 0, 10, 0);       // Голова
                const body = createPart(8, 12, 4, 20, 20, 0, 0, 0);     // Тело
                const leftArm = createPart(4, 12, 4, 44, 20, -6, 0, 0);  // Левая рука
                const rightArm = createPart(4, 12, 4, 40, 20, 6, 0, 0);  // Правая рука
                const leftLeg = createPart(4, 12, 4, 4, 20, -2, -12, 0); // Левая нога
                const rightLeg = createPart(4, 12, 4, 0, 20, 2, -12, 0); // Правая нога

                playerGroup.add(head, body, leftArm, rightArm, leftLeg, rightLeg);
                scene.add(playerGroup);
                animate();
            });

            // Вращение мышкой
            const dom = renderer.domElement;
            dom.addEventListener('mousedown', e => { isDragging = true; });
            dom.addEventListener('mousemove', e => {
                const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                if (isDragging && playerGroup) {
                    playerGroup.rotation.y += deltaMove.x * 0.01;
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });
            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function animate() {
            if (!playerGroup) return;
            requestAnimationFrame(animate);
            if (!isDragging) {
                playerGroup.rotation.y += 0.01; // Плавный автооборот
            }
            renderer.render(scene, camera);
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            window.history.replaceState({}, document.title, window.location.pathname);
            playerGroup = null;
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Защита от воровства скинов
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
    </script>
</body>
</html>
