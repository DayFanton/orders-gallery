<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Skin Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 10; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="ui">
        <button onclick="toggleLayer()">Вкл/Выкл 2-й слой</button>
    </div>
    <div id="container"></div>

    <script>
        let scene, camera, renderer, controls, player;
        let secondLayerVisible = true;

        function init(skinUrl) {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 40);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            
            const light = new THREE.AmbientLight(0xffffff, 1);
            scene.add(light);

            // Загрузка текстуры
            const loader = new THREE.TextureLoader();
            loader.load(skinUrl, (texture) => {
                texture.magFilter = THREE.NearestFilter;
                
                // Создаем полноценную модель (это упрощенная логика для наглядности)
                // Для идеального вьюера лучше использовать готовую библиотеку skinview3d, 
                // но раз у нас проблемы с доступом, используем чистый Three.js
                player = new THREE.Group();
                
                // Пример головы
                const headGeo = new THREE.BoxGeometry(8, 8, 8);
                const headMat = new THREE.MeshBasicMaterial({ map: texture });
                const head = new THREE.Mesh(headGeo, headMat);
                player.add(head);
                
                scene.add(player);
                render();
            });
        }

        function toggleLayer() {
            secondLayerVisible = !secondLayerVisible;
            // Здесь будет логика скрытия/показа слоя через player.children
        }

        function render() {
            requestAnimationFrame(render);
            controls.update();
            renderer.render(scene, camera);
        }

        init('skins/Day_Apocalypse.png?t=' + Date.now());
    </script>
</body>
</html>
