<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея 3D Скинов</title>
    
    <script src="https://unpkg.com/skinview3d@2.1.2/dist/skinview3d.bundle.js"></script>

    <style>
        :root {
            --bg-main: #121214;
            --bg-sidebar: #1a1a1e;
            --bg-card: #202024;
            --bg-hover: #29292e;
            --text-main: #e1e1e6;
            --text-muted: #8d8d99;
            --accent: #04d361;
            --accent-hover: #00b34d;
        }

        body {
            margin: 0 !important;
            padding: 0;
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Минималистичный сайдбар */
        #sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--bg-hover);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--bg-hover);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .skin-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Кнопки галереи */
        .skin-item {
            padding: 14px 16px;
            background: var(--bg-card);
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .skin-item:hover {
            background: var(--bg-hover);
            transform: translateY(-1px);
        }

        .skin-item.active {
            background: rgba(4, 211, 97, 0.1);
            border-color: var(--accent);
            color: #fff;
        }

        .skin-name {
            font-weight: 600;
        }

        /* Информационные плашки под скином */
        .meta-info {
            padding: 20px;
            background: var(--bg-card);
            border-top: 1px solid var(--bg-hover);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .meta-row {
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        .meta-label { color: var(--text-muted); }
        .meta-value { font-weight: 500; color: #fff; }

        /* Зона просмотра */
        #viewer_zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #1e1e24 0%, var(--bg-main) 100%);
        }

        #skin_container {
            width: 550px;
            height: 550px;
            outline: none;
            cursor: grab;
        }

        #skin_container:active {
            cursor: grabbing;
        }

        #loading {
            position: absolute;
            font-size: 16px;
            color: var(--accent);
            font-weight: 500;
            pointer-events: none;
            background: rgba(18, 18, 20, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--bg-hover);
        }

        /* Стилизация скроллбара */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Коллекция скинов</h2>
        </div>
        
        <div class="skin-list" id="skinList">
            </div>

        <div class="meta-info">
            <div class="meta-row">
                <span class="meta-label">Заказчик:</span>
                <span class="meta-value" id="infoCustomer">—</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Художник:</span>
                <span class="meta-value" id="infoAuthor">—</span>
            </div>
        </div>
    </div>

    <div id="viewer_zone">
        <div id="loading">Инициализация сцены...</div>
        <canvas id="skin_container"></canvas>
    </div>

    <script>
        let skinViewer = null;
        let globalSkinsData = [];

        document.addEventListener('contextmenu', e => e.preventDefault());

        function initViewer() {
            if (!window.skinview3d) {
                document.getElementById('loading').textContent = "Ошибка загрузки скриптов 3D.";
                return;
            }

            try {
                skinViewer = new skinview3d.SkinViewer({
                    canvas: document.getElementById('skin_container'),
                    width: 550,
                    height: 550
                });

                // Настройки мыши (Вращение и Зум)
                skinViewer.controls.enableRotate = true;
                skinViewer.controls.enableZoom = true;
                
                // Легкое авто-вращение по умолчанию
                skinViewer.autoRotate = true;
                skinViewer.autoRotateSpeed = 0.4;
                
                // Эффект ходьбы
                skinViewer.animation = new skinview3d.WalkingAnimation();
                skinViewer.animation.speed = 0.5;

                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                console.error(e);
                document.getElementById('loading').textContent = "Ошибка создания 3D сцены.";
            }
        }

        async function loadGallery() {
            try {
                const response = await fetch('skins.json');
                globalSkinsData = await response.json();
                const listContainer = document.getElementById('skinList');

                globalSkinsData.forEach((skin) => {
                    const item = document.createElement('div');
                    item.classList.add('skin-item');
                    item.id = `skin-${skin.filename}`;
                    
                    item.innerHTML = `<span class="skin-name">${skin.skinName}</span>`;
                    
                    item.onclick = () => {
                        selectSkin(skin.filename, true);
                    };

                    listContainer.appendChild(item);
                });

                initViewer();
                
                // Проверяем, есть ли хэш/параметр в ссылке браузера
                const urlParams = new URLSearchParams(window.location.search);
                const skinParam = urlParams.get('skin');

                if (skinParam && globalSkinsData.some(s => s.filename === skinParam)) {
                    selectSkin(skinParam, false);
                } else if (globalSkinsData.length > 0) {
                    selectSkin(globalSkinsData[0].filename, false);
                }

            } catch (error) {
                console.error(error);
                document.getElementById('loading').textContent = "Ошибка чтения skins.json";
            }
        }

        function selectSkin(filename, shouldCopy = true) {
            if (!skinViewer) return;

            const skin = globalSkinsData.find(s => s.filename === filename);
            if (!skin) return;

            // Смена активного класса у кнопок
            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            const currentItem = document.getElementById(`skin-${filename}`);
            if (currentItem) currentItem.classList.add('active');

            // Подгрузка файла текстуры png
            const skinPath = `skins/${skin.filename}.png`;
            const isSlim = (skin.model === "alex");
            
            try {
                skinViewer.loadSkin(skinPath, isSlim ? "slim" : "default");
            } catch(e) {
                console.error(e);
            }

            // Обновляем плашки с информацией
            document.getElementById('infoCustomer').textContent = skin.customer || 'Не указан';
            document.getElementById('infoAuthor').textContent = skin.author || 'Не указан';

            // Меняем адресную строку без перезагрузки всей страницы
            const baseUrl = window.location.href.split('?')[0];
            const newUrl = `${baseUrl}?skin=${filename}`;
            window.history.pushState({ path: newUrl }, '', newUrl);

            // Автоматическое тихое копирование для таблицы Excel
            if (shouldCopy) {
                navigator.clipboard.writeText(newUrl).catch(() => {});
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
