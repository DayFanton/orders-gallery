<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея Заказов Скинов</title>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --accent: #00ca72;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        h1 { text-align: center; font-weight: 600; margin-bottom: 30px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            border: 1px solid #2a2a2a;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card .customer { font-size: 12px; color: var(--accent); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .card .skin-name { font-size: 18px; margin: 8px 0; font-weight: bold; }
        .card .model-type { font-size: 12px; color: var(--text-muted); }
        
        #viewer-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #canvas-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; cursor: grab; }
        canvas:active { cursor: grabbing; }
        .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 35px; color: white; cursor: pointer;
            background: none; border: none; z-index: 1001;
            transition: color 0.2s;
        }
        .close-btn:hover { color: var(--accent); }
        #loading { position: absolute; color: white; font-size: 20px; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <h1>Каталог выполненных скинов</h1>
    <div class="gallery" id="gallery"></div>

    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">&times;</button>
        <div id="loading">Загрузка скина...</div>
        <div id="canvas-container"></div>
    </div>

    <script>
        // Загрузка галереи из JSON
        fetch('skins.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.forEach(skin => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="customer">${skin.customer}</div>
                        <div class="skin-name">${skin.skinName}</div>
                        <div class="model-type">Формат: ${skin.model === 'slim' ? 'Алекс' : 'Стив'}</div>
                    `;
                    card.onclick = () => openViewer(skin.filename);
                    gallery.appendChild(card);
                });

                // Чтение параметров URL для интеграции с таблицей (?skin=имя)
                const urlParams = new URLSearchParams(window.location.search);
                const directSkin = urlParams.get('skin');
                if (directSkin) openViewer(directSkin);
            }).catch(err => console.error("Ошибка JSON:", err));

        let animationFrameId;
        let rotationY = 0;
        let rotationX = 0;

        function openViewer(filename) {
            document.getElementById('viewer-modal').style.display = 'flex';
            document.getElementById('loading').style.display = 'block';
            
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            const img = new Image();
            img.src = `skins/${filename}.png`;
            
            img.onload = function() {
                document.getElementById('loading').style.display = 'none';
                
                // Создаем холст для рендера развертки лица/тела в 2D-превью (или псевдо-3D)
                const canvas = document.createElement('canvas');
                canvas.width = 300;
                canvas.height = 300;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;

                let isDragging = false;
                let previousMouseX = 0;

                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    
                    // Эмуляция вращения текстуры скина (передний план лица + тела)
                    let scaleX = Math.cos(rotationY);
                    ctx.scale(scaleX, 1);

                    // Если лицо повернуто к нам фронтом — рисуем переднюю часть
                    if (scaleX > 0) {
                        // Голова (Скин развёртка: x=8, y=8, w=8, h=8)
                        ctx.drawImage(img, 8, 8, 8, 8, -32, -80, 64, 64);
                        // Тело (Скин развёртка: x=20, y=20, w=8, h=12)
                        ctx.drawImage(img, 20, 20, 8, 12, -32, -16, 64, 96);
                    } else {
                        // Затылок (Скин развёртка: x=24, y=8, w=8, h=8)
                        ctx.drawImage(img, 24, 8, 8, 8, -32, -80, 64, 64);
                        // Спина (Скин развёртка: x=32, y=20, w=8, h=12)
                        ctx.drawImage(img, 32, 20, 8, 12, -32, -16, 64, 96);
                    }
                    
                    ctx.restore();
                    
                    if (!isDragging) {
                        rotationY += 0.02; // Скорость авто-вращения
                    }
                    animationFrameId = requestAnimationFrame(draw);
                }

                // Управление мышкой
                canvas.addEventListener('mousedown', e => {
                    isDragging = true;
                    previousMouseX = e.clientX;
                });

                window.addEventListener('mousemove', e => {
                    if (isDragging) {
                        const deltaX = e.clientX - previousMouseX;
                        rotationY += deltaX * 0.01;
                        previousMouseX = e.clientX;
                    }
                });

                window.addEventListener('mouseup', () => { isDragging = false; });

                container.appendChild(canvas);
                draw();
            };

            img.onerror = function() {
                document.getElementById('loading').innerText = 'Ошибка: Файл скина не найден в папке skins/';
            };
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            window.history.replaceState({}, document.title, window.location.pathname);
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            rotationY = 0;
        }

        // ================= ЗАЩИТА ОТ СКАЧИВАНИЯ =================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
    </script>
</body>
</html>
