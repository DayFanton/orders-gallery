<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея Заказов Скинов</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --accent: #00ca72;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 { text-align: center; font-weight: 600; margin-bottom: 30px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            cursor: pointer;
            border: 1px solid #2a2a2a;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card .customer { font-size: 12px; color: var(--accent); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .card .skin-name { font-size: 18px; margin: 8px 0; font-weight: bold; }
        .card .model-type { font-size: 12px; color: var(--text-muted); }
        
        #viewer-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 35px; color: white; cursor: pointer;
            background: none; border: none; z-index: 1001;
        }
        .close-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

    <h1>Каталог выполненных скинов</h1>
    <div class="gallery" id="gallery"></div>

    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">&times;</button>
        <div id="canvas-container"></div>
    </div>

    <script>
        let scene, camera, renderer, skinMesh;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        // Загружаем список из JSON
        fetch('skins.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.forEach(skin => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="customer">${skin.customer}</div>
                        <div class="skin-name">${skin.skinName}</div>
                        <div class="model-type">Формат: ${skin.model === 'slim' ? 'Алекс' : 'Стив'}</div>
                    `;
                    card.onclick = () => openViewer(skin.filename);
                    gallery.appendChild(card);
                });

                // Проверка прямой ссылки из таблицы: ?skin=имя
                const urlParams = new URLSearchParams(window.location.search);
                const directSkin = urlParams.get('skin');
                if (directSkin) openViewer(directSkin);
            });

        function openViewer(filename) {
            document.getElementById('viewer-modal').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // Создаем 3D сцену
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionLight(0xffffff, 0.4);
            dirLight.position.set(10, 20, 15);
            scene.add(dirLight);

            // Текстура скина
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(`skins/${filename}.png`, function(texture) {
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;

                // Создаем простую замену — красивый 3D бокс игрока
                const geometry = new THREE.BoxGeometry(8, 12, 4);
                const material = new THREE.MeshStandardMaterial({ map: texture });
                skinMesh = new THREE.Mesh(geometry, material);
                scene.add(skinMesh);
                animate();
            });

            // Управление мышкой (крутить-вертеть)
            const dom = renderer.domElement;
            dom.addEventListener('mousedown', e => { isDragging = true; });
            dom.addEventListener('mousemove', e => {
                const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                if (isDragging && skinMesh) {
                    skinMesh.rotation.y += deltaMove.x * 0.01;
                    skinMesh.rotation.x += deltaMove.y * 0.01;
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });
            window.addEventListener('mouseup', e => { isDragging = false; });
        }

        function animate() {
            if (!skinMesh) return;
            requestAnimationFrame(animate);
            if (!isDragging) {
                skinMesh.rotation.y += 0.01; // авто-вращение
            }
            renderer.render(scene, camera);
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            window.history.replaceState({}, document.title, window.location.pathname);
            skinMesh = null;
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // ================= ЗАЩИТА ОТ СКАЧИВАНИЯ =================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
    </script>
</body>
</html>
