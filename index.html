<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея 3D Скинов</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://bs-community.github.io/skinview3d/js/skinview3d.bundle.js"></script>

    <style>
        :root {
            --bg-main: #0b0b0d;
            --bg-sidebar: #131316;
            --bg-card: #1c1c21;
            --bg-hover: #26262b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #10b981;
            --border: #27272a;
        }

        body {
            margin: 0 !important;
            padding: 0;
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
        }

        .section-title {
            padding: 20px 24px 10px 24px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .skin-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
        }

        .skin-item {
            padding: 14px 16px;
            background: var(--bg-card);
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .skin-item:hover {
            background: var(--bg-hover);
        }

        .skin-item.active {
            background: rgba(16, 185, 129, 0.08);
            border-color: var(--accent);
        }

        .skin-name {
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
        }

        .meta-info {
            padding: 20px 24px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .meta-row {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-label { color: var(--text-muted); }
        .meta-value { font-weight: 500; color: #fff; background: var(--bg-card); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }

        #viewer_zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #1c1c24 0%, var(--bg-main) 100%);
        }

        #skin_container {
            width: 100%;
            height: 100%;
            outline: none;
            cursor: grab;
        }

        #skin_container:active { cursor: grabbing; }

        #controls_panel {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .control-group {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .control-group h3 {
            margin: 0 0 12px 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
        }

        .btn {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .checkbox-label input {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .radio-btn {
            position: relative;
        }

        .radio-btn input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-btn span {
            display: block;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .radio-btn input:checked + span {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        #loading {
            position: absolute;
            font-size: 0.9rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="section-title">Галерея скинов</div>
        <div class="skin-list" id="skinList"></div>
        
        <div class="meta-info">
            <div class="meta-row">
                <span class="meta-label">Заказчик</span>
                <span class="meta-value" id="infoCustomer">—</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Художник</span>
                <span class="meta-value" id="infoAuthor">—</span>
            </div>
        </div>
    </div>

    <div id="viewer_zone">
        <div id="loading">Загрузка модулей визуализации...</div>
        <canvas id="skin_container"></canvas>
    </div>

    <div id="controls_panel">
        <div class="control-group">
            <button class="btn" id="reset_all">Сбросить камеру</button>
        </div>

        <div class="control-group">
            <h3>Вращение</h3>
            <label class="checkbox-label">
                <input type="checkbox" id="auto_rotate">
                <span>Вращать модель</span>
            </label>
        </div>

        <div class="control-group">
            <h3>Анимация движения</h3>
            <div class="radio-grid">
                <label class="radio-btn">
                    <input type="radio" name="animation" value="none" checked>
                    <span>Покой</span>
                </label>
                <label class="radio-btn">
                    <input type="radio" name="animation" value="walk">
                    <span>Ходьба</span>
                </label>
                <label class="radio-btn">
                    <input type="radio" name="animation" value="run">
                    <span>Бег</span>
                </label>
                <label class="radio-btn">
                    <input type="radio" name="animation" value="fly">
                    <span>Полет</span>
                </label>
            </div>
        </div>

        <div class="control-group">
            <h3>Отображение слоев</h3>
            <label class="checkbox-label">
                <input type="checkbox" id="layer_head" checked>
                <span>Головной убор / Волосы</span>
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="layer_body" checked>
                <span>Верхняя одежда / Броня</span>
            </label>
        </div>
    </div>

    <script>
        let skinViewer = null;
        let globalSkins = [];
        let currentAnimationType = 'none';

        document.addEventListener('contextmenu', e => e.preventDefault());

        function initViewer() {
            try {
                const container = document.getElementById('viewer_zone');
                skinViewer = new skinview3d.SkinViewer({
                    canvas: document.getElementById('skin_container'),
                    width: container.clientWidth,
                    height: container.clientHeight
                });

                skinViewer.controls.enableRotate = true;
                skinViewer.controls.enableZoom = true;
                
                skinViewer.globalLight.intensity = 3.0; 
                skinViewer.cameraLight.intensity = 0.6;

                skinViewer.autoRotate = false;
                skinViewer.autoRotateSpeed = 0.6;

                document.getElementById('loading').style.display = 'none';

                window.addEventListener('resize', () => {
                    skinViewer.width = container.clientWidth;
                    skinViewer.height = container.clientHeight;
                });

                initControlListeners();

            } catch (e) {
                console.error(e);
                document.getElementById('loading').textContent = "Ошибка инициализации 3D компонентов.";
            }
        }

        // Применяет выбранную анимацию без наслоения багов
        function applyAnimation() {
            if (!skinViewer) return;
            
            // Сбрасываем текущую анимацию и очищаем внутреннее время
            skinViewer.animation = null;
            
            if (currentAnimationType === 'walk') {
                skinViewer.animation = new skinview3d.WalkingAnimation();
            } else if (currentAnimationType === 'run') {
                skinViewer.animation = new skinview3d.RunningAnimation();
            } else if (currentAnimationType === 'fly') {
                skinViewer.animation = new skinview3d.FlyingAnimation();
            }
        }

        function initControlListeners() {
            document.getElementById('reset_all').onclick = () => {
                skinViewer.controls.reset();
            };

            document.getElementById('auto_rotate').onchange = (e) => {
                skinViewer.autoRotate = e.target.checked;
            };

            document.querySelectorAll('input[name="animation"]').forEach(radio => {
                radio.onchange = (e) => {
                    currentAnimationType = e.target.value;
                    
                    // Чтобы скин не разваливался, принудительно перезагружаем текущую текстуру 
                    // Это полностью сбрасывает все кости модели в исходное целое состояние
                    const activeItem = document.querySelector('.skin-item.active');
                    if (activeItem) {
                        const filename = activeItem.id.replace('item-', '');
                        selectSkin(filename, false); 
                    } else {
                        applyAnimation();
                    }
                };
            });

            // Настройка слоев
            const updateLayers = () => {
                if (!skinViewer) return;
                const headVisible = document.getElementById('layer_head').checked;
                const bodyVisible = document.getElementById('layer_body').checked;
                
                skinViewer.playerObject.skin.head.outerLayer.visible = headVisible;
                skinViewer.playerObject.skin.body.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.leftArm.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.rightArm.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.leftLeg.outerLayer.visible = bodyVisible;
                skinViewer.playerObject.skin.rightLeg.outerLayer.visible = bodyVisible;
            };

            document.getElementById('layer_head').onchange = updateLayers;
            document.getElementById('layer_body').onchange = updateLayers;
            
            // Прокидываем функцию для повторного вызова при смене скинов
            window.refreshLayers = updateLayers;
        }

        async function loadSkinsJSON() {
            try {
                const response = await fetch('skins.json?v=' + Math.random());
                globalSkins = await response.json();
                const list = document.getElementById('skinList');
                list.innerHTML = ''; 

                globalSkins.forEach(skin => {
                    const item = document.createElement('div');
                    item.classList.add('skin-item');
                    item.id = `item-${skin.filename}`;
                    item.innerHTML = `<span class="skin-name">${skin.skinName || 'Скин без названия'}</span>`;
                    
                    item.onclick = () => selectSkin(skin.filename, true);
                    list.appendChild(item);
                });

                initViewer();

                const params = new URLSearchParams(window.location.search);
                const activeSkin = params.get('skin');

                if (activeSkin && globalSkins.some(s => s.filename === activeSkin)) {
                    selectSkin(activeSkin, false);
                } else if (globalSkins.length > 0) {
                    selectSkin(globalSkins[0].filename, false);
                }

            } catch (err) {
                document.getElementById('loading').textContent = "Не удалось прочесть список skins.json";
            }
        }

        function selectSkin(filename, updateUrl = true) {
            if (!skinViewer) return;
            const skin = globalSkins.find(s => s.filename === filename);
            if (!skin) return;

            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            const currentItem = document.getElementById(`item-${filename}`);
            if (currentItem) currentItem.classList.add('active');

            const cleanFilename = filename.replace(/\.(png|PNG)$/, "");
            const skinPath = `skins/${cleanFilename}.png`;
            
            // Загружаем скин и по окончании накладываем анимации и слои заново
            skinViewer.loadSkin(skinPath, skin.model === 'alex' ? 'slim' : 'default').then(() => {
                applyAnimation();
                if (window.refreshLayers) window.refreshLayers();
            });

            document.getElementById('infoCustomer').textContent = skin.customer || 'Не указан';
            document.getElementById('infoAuthor').textContent = skin.author || 'Не указан';

            // Обновляем адресную строку только для переходов, БЕЗ копирования в буфер
            if (updateUrl) {
                const baseUrl = window.location.origin + window.location.pathname;
                const generatedUrl = `${baseUrl}?skin=${filename}`;
                window.history.pushState({ path: generatedUrl }, '', generatedUrl);
            }
        }

        window.onload = loadSkinsJSON;
    </script>
</body>
</html>
